<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kanban Board</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%236366f1'/><stop offset='100%25' stop-color='%238b5cf6'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23g)'/><rect x='10' y='14' width='10' height='36' rx='3' fill='white' opacity='0.9'/><rect x='27' y='14' width='10' height='24' rx='3' fill='white' opacity='0.7'/><rect x='44' y='14' width='10' height='16' rx='3' fill='white' opacity='0.5'/></svg>">
<style>
/* ── CSS Variables ── */
:root {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --surface-hover: #e2e8f0;
  --border: #e2e8f0;
  --text: #1e293b;
  --text-muted: #64748b;
  --todo: #f59e0b;
  --doing: #3b82f6;
  --done: #10b981;
  --accent: #6366f1;
  --cat-work: #8b5cf6;
  --cat-daily: #d97706;
  --cat-personal: #ec4899;
  --cat-study: #0e7490;
  --cat-kids: #2e7d32;
  --cat-other: #64748b;
  --radius: 10px;
  --shadow: 0 4px 16px rgba(0,0,0,0.08);
  --tab-h: 68px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
  --bg-todo: #fef9ec;
  --bg-doing: #eff6ff;
  --bg-done: #f0fdf4;
  --toast-bg: #1e293b;
  --toast-text: #fff;
}

/* ── Dark mode variables ── */
@media (prefers-color-scheme: dark) {
  html:not([data-theme="light"]) {
    --bg: #0f172a; --surface: #1e293b; --surface-hover: #334155;
    --border: #334155; --text: #f1f5f9; --text-muted: #94a3b8;
    --shadow: 0 4px 16px rgba(0,0,0,0.35);
    --bg-todo: #1a160a; --bg-doing: #0d1825; --bg-done: #081a10;
    --toast-bg: #334155; --toast-text: #f1f5f9;
  }
}
html[data-theme="dark"] {
  --bg: #0f172a; --surface: #1e293b; --surface-hover: #334155;
  --border: #334155; --text: #f1f5f9; --text-muted: #94a3b8;
  --shadow: 0 4px 16px rgba(0,0,0,0.35);
  --bg-todo: #1a160a; --bg-doing: #0d1825; --bg-done: #081a10;
  --toast-bg: #334155; --toast-text: #f1f5f9;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

/* ════════════════════════════════════════
   SHARED STYLES (both desktop and mobile)
   ════════════════════════════════════════ */

/* Category badge colors */
.cat-work    { background: rgba(139,92,246,0.15); color: var(--cat-work); }
.cat-daily   { background: rgba(217,119,6,0.15); color: var(--cat-daily); }
.cat-personal { background: rgba(236,72,153,0.15); color: var(--cat-personal); }
.cat-study   { background: rgba(14,116,144,0.15); color: var(--cat-study); }
.cat-kids    { background: rgba(46,125,50,0.15); color: var(--cat-kids); }
.cat-other   { background: rgba(100,116,139,0.15); color: var(--cat-other); }


/* Celebration canvas */
.confetti-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 300;
}

/* ════════════════════════════════════════
   DESKTOP STYLES (min-width: 769px)
   ════════════════════════════════════════ */
@media (min-width: 769px) {
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
  }

  /* Header */
  header {
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 1.3rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--todo), var(--doing), var(--done));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-stats {
    display: flex;
    gap: 16px;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .header-stats span { display: flex; align-items: center; gap: 4px; }
  .stat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .header-buttons { display: flex; gap: 8px; }
  .btn-add {
    padding: 10px 20px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-add:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,0.4); }
  .btn-add:active { transform: scale(0.97); }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 6px;
    padding: 12px 28px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-separator {
    width: 1px; height: 18px;
    background: var(--border);
    margin: 0 4px;
  }
  .filter-chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .filter-chip:hover { border-color: rgba(0,0,0,0.2); }
  .filter-chip.active { background: rgba(99,102,241,0.15); border-color: #6366f1; color: #4f46e5; }

  /* Pressure forecast widget */
  .pressure-widget {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .pressure-widget-label {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--text-muted);
    margin-right: 2px;
    white-space: nowrap;
  }
  .pw-day {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4px 7px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    min-width: 52px;
    transition: all 0.15s;
  }
  .pw-day.today {
    border-color: var(--doing);
    background: rgba(59,130,246,0.06);
  }
  .pw-day.warn {
    border-color: #ef4444;
    background: rgba(239,68,68,0.08);
  }
  .pw-date { font-size: 0.6rem; color: var(--text-muted); }
  .pw-icon { font-size: 0.85rem; line-height: 1; }
  .pw-hpa { font-size: 0.78rem; font-weight: 800; color: var(--text); }
  .pw-day.warn .pw-hpa { color: #ef4444; }
  .pw-diff { font-size: 0.58rem; color: var(--text-muted); }
  .pw-diff.drop { color: #ef4444; font-weight: 700; }
  .pw-diff.rise { color: #10b981; }

  /* Board */
  .board {
    display: flex;
    gap: 14px;
    padding: 14px;
    align-items: start;
    justify-content: center;
  }

  /* Column */
  .column {
    flex: 1 1 0;
    min-width: 200px;
    max-width: 30vw;
    background: var(--surface);
    border-radius: 14px;
    border: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .column-header {
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 700;
    font-size: 0.85rem;
    border-bottom: 2px solid var(--border);
  }
  .column-header .col-label { display: flex; align-items: center; gap: 8px; }
  .column-header .col-icon { width: 10px; height: 10px; border-radius: 50%; }
  .column-header .col-count {
    font-size: 0.75rem; font-weight: 600;
    padding: 2px 8px; border-radius: 10px;
    background: rgba(255,255,255,0.06); color: var(--text-muted);
  }
  .column[data-status="todo"]  .col-icon { background: var(--todo);  box-shadow: 0 0 8px var(--todo); }
  .column[data-status="doing"] .col-icon { background: var(--doing); box-shadow: 0 0 8px var(--doing); }
  .column[data-status="done"]  .col-icon { background: var(--done);  box-shadow: 0 0 8px var(--done); }

  .column-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }

  /* Swimlane structure */
  .swimlane {
    display: flex;
    flex-direction: column;
    flex: none;
    min-height: 80px;
    overflow-y: auto;
  }
  .swimlane + .swimlane {
    border-top: none;
  }
  /* Resizer handle between swimlanes */
  .swimlane-resizer {
    height: 6px;
    cursor: row-resize;
    background: var(--border);
    position: relative;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .swimlane-resizer:hover,
  .swimlane-resizer.active {
    background: var(--accent);
  }
  .swimlane-resizer::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 24px;
    height: 2px;
    border-radius: 1px;
    background: var(--text-muted);
    opacity: 0.4;
  }
  .swimlane-resizer:hover::after,
  .swimlane-resizer.active::after {
    opacity: 0.8;
    background: #fff;
  }
  .swimlane-header {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text-muted);
    padding: 4px 8px 2px;
    user-select: none;
    letter-spacing: 0.3px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .lane-name-label { cursor: pointer; }
  .lane-name-label:hover { color: var(--accent); }
  .lane-rename-input {
    font-size: 0.7rem; font-weight: 700; font-family: inherit;
    background: var(--bg); border: none; border-bottom: 1.5px solid var(--accent);
    color: var(--text); outline: none; width: 100px; padding: 0 2px;
  }
  .swimlane-del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 0.6rem; padding: 1px 4px;
    border-radius: 3px; opacity: 0; transition: opacity 0.15s, color 0.15s;
    line-height: 1;
  }
  .swimlane:hover .swimlane-del-btn { opacity: 0.6; }
  .swimlane-del-btn:hover { opacity: 1 !important; color: #ef4444; background: rgba(239,68,68,0.1); }

  /* Lane management bar */
  .lane-bar {
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
  }
  .lane-bar-label { font-size: 0.72rem; font-weight: 600; color: var(--text-muted); }
  .btn-add-lane {
    padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 600;
    border: 1px dashed var(--border); background: transparent; color: var(--text-muted);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-add-lane:hover { border-color: var(--accent); color: var(--accent); }
  .lane-input-wrap {
    display: none; align-items: center; gap: 6px;
  }
  .lane-input-wrap.open { display: flex; }
  .lane-new-input {
    padding: 4px 10px; border-radius: 20px; font-size: 0.72rem;
    border: 1.5px solid var(--accent); background: var(--bg); color: var(--text);
    outline: none; min-width: 140px; font-family: inherit;
  }
  .lane-add-ok {
    padding: 4px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700;
    border: none; background: var(--accent); color: #fff; cursor: pointer;
  }
  .swimlane-body {
    padding: 4px 8px 8px;
    min-height: 48px;
    flex: 1;
    transition: background 0.2s;
  }
  .swimlane-body.drag-over { background: rgba(99,102,241,0.05); }

  /* Desktop Card */
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 8px;
    margin-bottom: 5px;
    cursor: grab;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    position: relative;
  }
  .card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  .card.dragging { opacity: 0.4; transform: rotate(2deg); }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .card-category {
    font-size: 0.62rem; font-weight: 700;
    padding: 1px 6px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  /* Desktop Card backgrounds by category */
  .card.card-cat-work     { background: #c8bde6; border-color: #a99ad0; }
  .card.card-cat-daily    { background: #fde68a; border-color: #f59e0b; }
  .card.card-cat-personal { background: #f5c0da; border-color: #e898bf; }
  .card.card-cat-study    { background: #a0d4db; border-color: #80bac2; }
  .card.card-cat-kids     { background: #bcd898; border-color: #a2c478; }
  .card.card-cat-other    { background: #b8bec5; border-color: #98a0a8; }

  /* Dark mode card backgrounds */
  @media (prefers-color-scheme: dark) {
    html:not([data-theme="light"]) .card.card-cat-work     { background: #251840; border-color: #4c3580; }
    html:not([data-theme="light"]) .card.card-cat-daily    { background: #261a00; border-color: #7c5500; }
    html:not([data-theme="light"]) .card.card-cat-personal { background: #280d1e; border-color: #7c1e50; }
    html:not([data-theme="light"]) .card.card-cat-study    { background: #081e2e; border-color: #0e4060; }
    html:not([data-theme="light"]) .card.card-cat-kids     { background: #0c1e0c; border-color: #1e4a20; }
    html:not([data-theme="light"]) .card.card-cat-other    { background: #181e2a; border-color: #2e3a4a; }
  }
  html[data-theme="dark"] .card.card-cat-work     { background: #251840; border-color: #4c3580; }
  html[data-theme="dark"] .card.card-cat-daily    { background: #261a00; border-color: #7c5500; }
  html[data-theme="dark"] .card.card-cat-personal { background: #280d1e; border-color: #7c1e50; }
  html[data-theme="dark"] .card.card-cat-study    { background: #081e2e; border-color: #0e4060; }
  html[data-theme="dark"] .card.card-cat-kids     { background: #0c1e0c; border-color: #1e4a20; }
  html[data-theme="dark"] .card.card-cat-other    { background: #181e2a; border-color: #2e3a4a; }

  .card-actions { display: flex; gap: 2px; align-items: center; }
  .card-btn {
    background: none; border: none;
    color: var(--text-muted); font-size: 0.72rem;
    cursor: pointer; padding: 1px 4px; border-radius: 4px;
    opacity: 0; transition: opacity 0.15s, color 0.15s, background 0.15s; line-height: 1;
  }
  .card:hover .card-btn { opacity: 1; }
  .card-btn.pin-btn:hover    { color: var(--todo);  background: rgba(245,158,11,0.1); }
  .card-btn.delete-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
  .card-btn.lane-btn:hover   { color: var(--accent); background: rgba(99,102,241,0.1); }
  .card.pinned .pin-btn { opacity: 1; color: var(--todo); }
  .card-btn.ai-btn.active { opacity: 1; color: #6366f1; }
  .card .pin-icon { font-size: 0.78rem; }

  .drop-indicator { height: 3px; background: #6366f1; border-radius: 2px; margin: -2px 0; pointer-events: none; }

  .card-body { display: flex; align-items: flex-start; gap: 6px; }
  .card-body-left { flex: 1; min-width: 0; }
  .card-title { font-size: 0.8rem; font-weight: 600; line-height: 1.4; word-break: break-word; }
  .card-desc  { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; line-height: 1.4; word-break: break-word; }
  .card-due   { font-size: 0.65rem; margin-top: 3px; font-weight: 600; }
  .card-due.overdue { color: #ef4444; }
  .card-due.soon    { color: #f59e0b; }
  .card-due.ok      { color: #64748b; }

  .column[data-status="done"] .card-title { text-decoration: line-through; color: var(--text-muted); }

  .empty-state { text-align: center; color: var(--text-muted); font-size: 0.82rem; padding: 30px 10px; opacity: 0.6; }

  /* Desktop Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 90%; max-width: 440px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    animation: modalIn 0.2s ease-out;
  }
  @keyframes modalIn { from { opacity: 0; transform: translateY(16px) scale(0.97); } }
  .modal h2 { font-size: 1.1rem; margin-bottom: 20px; font-weight: 700; }
  .modal label {
    display: block; font-size: 0.82rem; font-weight: 600;
    color: var(--text-muted); margin-bottom: 6px; margin-top: 14px;
  }
  .modal label:first-of-type { margin-top: 0; }
  .modal input, .modal textarea, .modal select {
    width: 100%; padding: 10px 14px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 0.92rem; font-family: inherit; transition: border-color 0.15s;
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: #6366f1; }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal select option { background: var(--surface); }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
  .modal-actions button {
    padding: 10px 22px; border-radius: 8px; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; border: none; transition: transform 0.1s;
  }
  .modal-actions button:active { transform: scale(0.97); }
  .btn-cancel { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border) !important; }
  .btn-cancel:hover { background: var(--surface-hover); }
  .btn-submit { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
  .btn-submit:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.4); }

  /* Hide mobile-only elements on desktop */
  .mobile-header, .mobile-content, .tab-bar, .fab,
  .overlay, .confirm-overlay, .ctx-overlay, .ctx-menu,
  .toast, .ptr { display: none !important; }
}

/* ════════════════════════════════════════
   MOBILE STYLES (max-width: 768px)
   ════════════════════════════════════════ */
@media (max-width: 768px) {
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans JP', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Hide desktop-only elements on mobile */
  .desktop-header, .filter-bar,
  .board, .modal-overlay { display: none !important; }

  /* ── Mobile Header ── */
  .mobile-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    padding-top: var(--safe-t);
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
  }
  .header-title {
    font-size: 1.1rem; font-weight: 800;
    background: linear-gradient(135deg, var(--todo), var(--doing), var(--done));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-btns { display: flex; gap: 4px; }
  .icon-btn {
    background: none; border: none;
    color: var(--text-muted); font-size: 1.15rem;
    cursor: pointer; padding: 6px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .icon-btn:active { background: var(--bg); }

  /* Progress */
  .progress-wrap { padding: 0 16px 8px; }
  .progress-row {
    display: flex; justify-content: space-between;
    font-size: 0.7rem; color: var(--text-muted);
    margin-bottom: 5px; font-weight: 600;
  }
  .progress-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--todo), var(--doing), var(--done));
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  /* Search */
  .search-bar { display: none; padding: 0 12px 8px; gap: 8px; align-items: center; }
  .search-bar.open { display: flex; }
  .search-input-wrap {
    flex: 1; display: flex; align-items: center; gap: 8px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 8px 12px; transition: border-color 0.15s;
  }
  .search-input-wrap:focus-within { border-color: var(--accent); }
  .search-input-wrap span { color: var(--text-muted); font-size: 0.9rem; }
  .search-input { flex: 1; border: none; background: none; font-size: 0.9rem; color: var(--text); outline: none; }
  .search-input::placeholder { color: var(--text-muted); }
  .search-clear { background: none; border: none; color: var(--text-muted); font-size: 0.85rem; cursor: pointer; padding: 2px; }

  /* Category chips */
  .chips-scroll {
    display: flex; gap: 6px; overflow-x: auto;
    padding: 0 16px 10px; scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .chips-scroll::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; padding: 5px 14px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 600; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--surface); color: var(--text-muted);
    transition: all 0.15s; white-space: nowrap;
  }
  .chip.active { background: rgba(99,102,241,0.1); border-color: var(--accent); color: var(--accent); }

  /* ── Mobile Content ── */
  .mobile-content {
    flex: 1; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
    padding: 10px 12px calc(10px + var(--tab-h) + var(--safe-b) + 72px);
  }

  /* Empty state */
  .empty { text-align: center; color: var(--text-muted); padding: 70px 20px; }
  .empty-icon { font-size: 2.8rem; margin-bottom: 12px; opacity: 0.5; }
  .empty p { font-size: 0.85rem; opacity: 0.7; }

  /* ── Mobile Card ── */
  .swipe-wrap { position: relative; margin-bottom: 8px; }
  .swipe-bg {
    position: absolute; inset: 0; border-radius: 14px;
    display: flex; align-items: center; padding: 0 18px;
    font-size: 1.1rem; pointer-events: none; opacity: 0;
  }
  .swipe-bg.right { background: var(--doing); justify-content: flex-start; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px 10px 18px;
    position: relative; overflow: hidden;
    touch-action: pan-y; user-select: none; will-change: transform;
  }
  .card::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 5px;
    border-radius: 14px 0 0 14px;
  }
  .card.cc-work::before     { background: var(--cat-work); }
  .card.cc-daily::before    { background: var(--cat-daily); }
  .card.cc-study::before    { background: var(--cat-study); }
  .card.cc-personal::before { background: var(--cat-personal); }
  .card.cc-kids::before     { background: var(--cat-kids); }
  .card.cc-other::before    { background: var(--cat-other); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
  .card-title { font-size: 0.88rem; font-weight: 600; line-height: 1.45; flex: 1; word-break: break-word; }
  .card-title.struck { text-decoration: line-through; color: var(--text-muted); }
  .card-menu-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 1.1rem; cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0; margin-top: -1px;
  }
  .card-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.5; word-break: break-word; margin-bottom: 6px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
  .cat-badge {
    font-size: 0.62rem; font-weight: 700; padding: 2px 8px;
    border-radius: 10px; text-transform: uppercase; letter-spacing: 0.4px;
  }
  .cb-work     { background: rgba(139,92,246,.12); color: var(--cat-work); }
  .cb-daily    { background: rgba(217,119,6,.12);  color: var(--cat-daily); }
  .cb-study    { background: rgba(14,116,144,.12); color: var(--cat-study); }
  .cb-personal { background: rgba(236,72,153,.12); color: var(--cat-personal); }
  .cb-kids     { background: rgba(46,125,50,.12);  color: var(--cat-kids); }
  .cb-other    { background: rgba(100,116,139,.12);color: var(--cat-other); }

  /* Mobile due date badge */
  .card-due-m { font-size: 0.65rem; font-weight: 600; }
  .card-due-m.overdue { color: #ef4444; }
  .card-due-m.soon    { color: #f59e0b; }
  .card-due-m.ok      { color: #64748b; }

  /* ── Tab bar ── */
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(var(--tab-h) + var(--safe-b));
    padding-bottom: var(--safe-b);
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; z-index: 50;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
    border: none; background: none; cursor: pointer;
    position: relative; padding: 8px 4px;
  }
  .tab-dot { width: 30px; height: 5px; border-radius: 3px; background: var(--border); transition: background 0.2s, transform 0.2s; }
  .tab[data-s="todo"]  .tab-dot { background: var(--todo); }
  .tab[data-s="doing"] .tab-dot { background: var(--doing); }
  .tab[data-s="done"]  .tab-dot { background: var(--done); }
  .tab.active .tab-dot { transform: scaleX(1.3); }
  .tab-name { font-size: 0.68rem; font-weight: 600; color: var(--text-muted); transition: color 0.15s, font-weight 0.15s; }
  .tab[data-s="todo"].active  .tab-name { color: var(--todo);  font-weight: 800; }
  .tab[data-s="doing"].active .tab-name { color: var(--doing); font-weight: 800; }
  .tab[data-s="done"].active  .tab-name { color: var(--done);  font-weight: 800; }
  .tab-cnt {
    position: absolute; top: 5px; right: 50%; margin-right: -18px;
    background: var(--accent); color: #fff;
    font-size: 0.58rem; font-weight: 700;
    min-width: 16px; height: 16px; padding: 0 4px;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
  }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: calc(var(--tab-h) + var(--safe-b) + 14px);
    right: 18px; width: 54px; height: 54px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff; font-size: 1.6rem;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(99,102,241,.4);
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 51; line-height: 1;
  }
  .fab:active { transform: scale(0.9); box-shadow: 0 2px 10px rgba(99,102,241,.3); }

  /* ── Bottom Sheet ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.4); z-index: 100; align-items: flex-end;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: var(--surface); border-radius: 20px 20px 0 0;
    padding: 0 18px calc(18px + var(--safe-b));
    width: 100%; max-height: 92dvh; overflow-y: auto;
    animation: sheetUp 0.28s cubic-bezier(.32,.72,0,1);
  }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 14px; }
  .sheet h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
  .field input, .field textarea {
    width: 100%; padding: 11px 13px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-size: 1rem; /* 16px以上にしないとiOSが自動ズームしてIMEが壊れる */
    font-family: inherit; outline: none; transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: none; min-height: 60px; }

  /* Category selector */
  .cat-grid { display: flex; gap: 6px; flex-wrap: wrap; }
  .cat-opt {
    padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    border: 1.5px solid var(--border); background: var(--bg); color: var(--text-muted);
    cursor: pointer; transition: all 0.15s;
  }
  .cat-opt[data-c="work"].sel     { border-color: var(--cat-work);     background: rgba(139,92,246,.1);  color: var(--cat-work); }
  .cat-opt[data-c="daily"].sel    { border-color: var(--cat-daily);    background: rgba(217,119,6,.1);   color: var(--cat-daily); }
  .cat-opt[data-c="study"].sel    { border-color: var(--cat-study);    background: rgba(14,116,144,.1);  color: var(--cat-study); }
  .cat-opt[data-c="personal"].sel { border-color: var(--cat-personal); background: rgba(236,72,153,.1);  color: var(--cat-personal); }
  .cat-opt[data-c="kids"].sel     { border-color: var(--cat-kids);     background: rgba(46,125,50,.1);   color: var(--cat-kids); }
  .cat-opt[data-c="other"].sel    { border-color: var(--cat-other);    background: rgba(100,116,139,.1); color: var(--cat-other); }

  /* Status selector */
  .status-row { display: flex; gap: 6px; }
  .status-opt {
    flex: 1; padding: 9px 4px; border-radius: 10px; font-size: 0.75rem; font-weight: 600;
    border: 1.5px solid var(--border); background: var(--bg); color: var(--text-muted);
    cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .status-opt[data-s="todo"].sel  { border-color: var(--todo);  background: rgba(245,158,11,.1);  color: var(--todo); }
  .status-opt[data-s="doing"].sel { border-color: var(--doing); background: rgba(59,130,246,.1);  color: var(--doing); }
  .status-opt[data-s="done"].sel  { border-color: var(--done);  background: rgba(16,185,129,.1);  color: var(--done); }

  .sheet-btns { display: flex; gap: 10px; margin-top: 6px; }
  .btn-cancel {
    flex: 1; padding: 13px; border-radius: 10px;
    font-size: 0.88rem; font-weight: 600;
    border: 1.5px solid var(--border); background: var(--bg); color: var(--text-muted); cursor: pointer;
  }
  .btn-submit {
    flex: 2; padding: 13px; border-radius: 10px;
    font-size: 0.88rem; font-weight: 700;
    border: none; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; cursor: pointer;
  }
  .btn-submit:active { opacity: 0.85; }

  /* Quick action buttons */
  .btn-quick-doing {
    width: 100%; padding: 14px; border-radius: 12px;
    font-size: 1rem; font-weight: 800; border: none;
    background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; cursor: pointer;
    letter-spacing: 0.3px; box-shadow: 0 4px 14px rgba(59,130,246,0.3);
  }
  .btn-quick-doing:active { opacity: 0.85; }
  .btn-quick-done {
    width: 100%; padding: 14px; border-radius: 12px;
    font-size: 1rem; font-weight: 800; border: none;
    background: linear-gradient(135deg, #10b981, #059669); color: #fff; cursor: pointer;
    letter-spacing: 0.3px; box-shadow: 0 4px 14px rgba(16,185,129,0.3);
  }
  .btn-quick-done:active { opacity: 0.85; }
  .btn-quick-undo {
    width: 100%; padding: 14px; border-radius: 12px;
    font-size: 1rem; font-weight: 700;
    border: 1.5px solid var(--border); background: var(--bg); color: var(--text-muted); cursor: pointer;
  }
  .btn-quick-undo:active { opacity: 0.85; }

  /* ── Delete confirm ── */
  .confirm-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center;
  }
  .confirm-overlay.open { display: flex; }
  .confirm-dialog {
    background: var(--surface); border-radius: 16px; padding: 24px 20px 20px;
    width: calc(100% - 48px); max-width: 300px;
    box-shadow: 0 8px 32px rgba(0,0,0,.2); animation: sheetUp 0.2s ease;
  }
  .confirm-title  { font-size: 1rem; font-weight: 700; text-align: center; margin-bottom: 6px; }
  .confirm-msg    { font-size: 0.82rem; text-align: center; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
  .confirm-btns   { display: flex; gap: 10px; }
  .confirm-cancel { flex: 1; padding: 12px; border-radius: 10px; font-size: 0.9rem; font-weight: 600; border: 1.5px solid var(--border); background: var(--bg); color: var(--text-muted); cursor: pointer; }
  .confirm-ok     { flex: 1; padding: 12px; border-radius: 10px; font-size: 0.9rem; font-weight: 700; border: none; background: #ef4444; color: #fff; cursor: pointer; }
  .confirm-ok:active { opacity: 0.85; }

  /* ── Tab background ── */
  body { transition: background 0.25s ease; }
  body.tab-todo  { background: var(--bg-todo); }
  body.tab-doing { background: var(--bg-doing); }
  body.tab-done  { background: var(--bg-done); }

  /* ── Tab slide animation ── */
  @keyframes slideFromRight { from { transform: translateX(48px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideFromLeft  { from { transform: translateX(-48px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .mobile-content.slide-from-right { animation: slideFromRight 0.22s ease; }
  .mobile-content.slide-from-left  { animation: slideFromLeft  0.22s ease; }

  /* ── Context menu ── */
  .ctx-overlay { display: none; position: fixed; inset: 0; z-index: 150; }
  .ctx-overlay.open { display: block; }
  .ctx-menu {
    display: none; position: fixed;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 13px; box-shadow: 0 8px 32px rgba(0,0,0,.16);
    z-index: 151; min-width: 180px; overflow: hidden;
  }
  .ctx-menu.open { display: block; }
  .ctx-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: none; background: none; width: 100%; text-align: left; color: var(--text); }
  .ctx-item:active { background: var(--bg); }
  .ctx-item + .ctx-item { border-top: 1px solid var(--border); }
  .ctx-item.danger { color: #ef4444; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: calc(var(--tab-h) + var(--safe-b) + 80px);
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--toast-bg); color: var(--toast-text);
    padding: 10px 18px; border-radius: 24px; font-size: 0.82rem; font-weight: 600;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    z-index: 200; display: flex; gap: 12px; align-items: center; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast-undo { background: none; border: none; color: #a5b4fc; font-size: 0.82rem; font-weight: 700; cursor: pointer; padding: 0; }

  /* Pull to refresh */
  .ptr {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    height: 0; overflow: hidden; font-size: 0.8rem; color: var(--text-muted);
    background: var(--bg); transition: height 0.2s ease; flex-shrink: 0;
  }
  .ptr.visible { height: 44px; }
  .ptr-spinner { font-size: 1.1rem; display: inline-block; transition: transform 0.2s; }
  .ptr.ready .ptr-spinner { transform: rotate(180deg); }
  @keyframes ptrSpin { to { transform: rotate(360deg); } }
  .ptr.loading .ptr-spinner { animation: ptrSpin 0.7s linear infinite; }

  /* Mobile swimlane */
  .m-swimlane { }
  .m-swimlane + .m-swimlane { margin-top: 4px; padding-top: 8px; border-top: 2px solid var(--border); }
  .m-swimlane-header {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text-muted);
    padding: 0 2px 6px;
    letter-spacing: 0.3px;
    user-select: none;
  }

  /* Mobile lane toggle button on cards */
  .mobile-lane-btn {
    background: none; border: none;
    font-size: 0.85rem; cursor: pointer;
    padding: 2px 4px; border-radius: 6px;
    color: var(--text-muted); line-height: 1;
    flex-shrink: 0;
  }
  .mobile-lane-btn:active { background: var(--bg); }
  .mobile-lane-btn.active { color: #6366f1; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     LOGIN SCREEN
     ═══════════════════════════════════════ -->
<div id="loginScreen" style="
  display:flex; position:fixed; inset:0; z-index:9999;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  align-items:center; justify-content:center; flex-direction:column; gap:24px;
">
  <div style="text-align:center; color:white;">
    <div style="font-size:3rem; margin-bottom:8px;">📋</div>
    <h1 style="font-size:1.6rem; font-weight:800; margin-bottom:6px;">Kanban Board</h1>
    <p style="opacity:0.8; font-size:0.9rem;">Googleアカウントでログインしてください</p>
  </div>
  <button id="loginBtn" style="
    display:flex; align-items:center; gap:12px;
    background:white; color:#1e293b; border:none; border-radius:12px;
    padding:14px 28px; font-size:1rem; font-weight:700; cursor:pointer;
    box-shadow:0 4px 20px rgba(0,0,0,0.2);
  ">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Googleでログイン
  </button>
  <div id="loginError" style="color:rgba(255,255,255,0.8); font-size:0.85rem; display:none;"></div>
</div>

<!-- ═══════════════════════════════════════
     DESKTOP HTML
     ═══════════════════════════════════════ -->

<!-- Desktop Header -->
<header class="desktop-header">
  <h1>Kanban Board</h1>
  <div class="header-stats" id="stats"></div>
  <div class="header-buttons">
    <div id="userInfo" style="display:none; align-items:center; gap:8px; font-size:0.8rem; color:var(--text-muted);">
      <img id="userAvatar" style="width:28px;height:28px;border-radius:50%;" src="" alt="" referrerpolicy="no-referrer">
      <button onclick="handleSignOut()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:0.75rem;cursor:pointer;color:var(--text-muted);">ログアウト</button>
    </div>
    <button id="themeToggleDesktop" onclick="toggleTheme()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:1rem;cursor:pointer;color:var(--text-muted);transition:background 0.15s;" title="ダークモード切替">🌙</button>
    <button class="btn-add" onclick="openDesktopModal()">+ New Task</button>
  </div>
</header>

<!-- Desktop Filter + Lane Bar -->
<div class="filter-bar" id="filterBar">
  <span class="filter-chip active" data-cat="all"      onclick="setFilter('all')">All</span>
  <span class="filter-chip"        data-cat="daily"    onclick="setFilter('daily')">Daily</span>
  <span class="filter-chip"        data-cat="personal" onclick="setFilter('personal')">Personal</span>
  <span class="filter-chip"        data-cat="work"     onclick="setFilter('work')">Work</span>
  <span class="filter-chip"        data-cat="study"    onclick="setFilter('study')">Study</span>
  <span class="filter-chip"        data-cat="kids"     onclick="setFilter('kids')">Kids</span>
  <span class="filter-chip"        data-cat="other"    onclick="setFilter('other')">Other</span>
  <span class="filter-separator"></span>
  <div class="lane-bar" id="laneBar">
    <button class="btn-add-lane" onclick="toggleLaneInput()">＋ レーン追加</button>
    <div class="lane-input-wrap" id="laneInputWrap">
      <input type="text" class="lane-new-input" id="laneNewInput" placeholder="レーン名（例：🎯 企画）"
             onkeydown="if(event.key==='Enter'&&!event.isComposing){commitAddLane();}"
             maxlength="20">
      <button class="lane-add-ok" onclick="commitAddLane()">追加</button>
    </div>
  </div>
  <div class="pressure-widget" id="pressureWidget">
    <span class="pressure-widget-label">気圧予報</span>
  </div>
</div>

<!-- Desktop Board -->
<div class="board" id="board">
  <div class="column" data-status="todo">
    <div class="column-header">
      <span class="col-label"><span class="col-icon"></span> Todo</span>
      <span class="col-count" id="count-todo">0</span>
    </div>
    <div class="column-body" id="col-todo"></div>
  </div>
  <div class="column" data-status="doing">
    <div class="column-header">
      <span class="col-label"><span class="col-icon"></span> Doing</span>
      <span class="col-count" id="count-doing">0</span>
    </div>
    <div class="column-body" id="col-doing"></div>
  </div>
  <div class="column" data-status="done">
    <div class="column-header">
      <span class="col-label"><span class="col-icon"></span> Done</span>
      <span class="col-count" id="count-done">0</span>
    </div>
    <div class="column-body" id="col-done"></div>
  </div>
</div>

<!-- Desktop Task Modal -->
<div class="modal-overlay" id="desktopModal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 id="modalTitle">New Task</h2>
    <label>Title *</label>
    <input type="text" id="taskTitle" placeholder="What needs to be done?" maxlength="100" autofocus>

<script type="module">
// ════════════════════════════════════════
// Firebase
// ════════════════════════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBadywmMpuz7v6uPaOis85YoTjRAT_yurU",
  authDomain: "my-kanban-4cafd.firebaseapp.com",
  projectId: "my-kanban-4cafd",
  storageBucket: "my-kanban-4cafd.firebasestorage.app",
  messagingSenderId: "880333494754",
  appId: "1:880333494754:web:bc10c63e71bbb1c24d81bb"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);
const provider = new GoogleAuthProvider();
let currentUser = null;
const tasksCol = collection(db, 'tasks');

// ════════════════════════════════════════
// Theme
// ════════════════════════════════════════
function applyTheme(theme) {
  const html = document.documentElement;
  if (theme === 'dark')  { html.setAttribute('data-theme', 'dark');  }
  else if (theme === 'light') { html.setAttribute('data-theme', 'light'); }
  else { html.removeAttribute('data-theme'); }
  const isDark = theme === 'dark' ||
    (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const icon = isDark ? '☀️' : '🌙';
  document.querySelectorAll('#themeToggleDesktop, #themeToggleMobile').forEach(b => b.textContent = icon);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  let next;
  if (current === 'dark')       next = 'light';
  else if (current === 'light') next = null;
  else next = systemDark ? 'light' : 'dark';
  if (next) localStorage.setItem('kanban_theme', next);
  else      localStorage.removeItem('kanban_theme');
  applyTheme(next);
}

// Init theme on load
applyTheme(localStorage.getItem('kanban_theme') || null);
window.toggleTheme = toggleTheme;

// ════════════════════════════════════════
// Shared State
// ════════════════════════════════════════
let tasks = [];
let currentFilter = 'all';
let editingId = null;

// ── Swimlane config ──
const DEFAULT_LANES = [
  { id: 'work',     name: '💼 仕事' },
  { id: 'personal', name: '👤 個人' },
];
let lanesConfig = DEFAULT_LANES.map(l => ({...l}));

function loadLanes() {
  try {
    const s = localStorage.getItem('kanban_lanes');
    if (s) lanesConfig = JSON.parse(s);
  } catch(e) {}
}
function saveLanes() {
  localStorage.setItem('kanban_lanes', JSON.stringify(lanesConfig));
}

// ── Lane height persistence ──
const DEFAULT_LANE_HEIGHT = 320; // ~4 cards visible
let laneHeights = {};
function loadLaneHeights() {
  try {
    const s = localStorage.getItem('kanban_lane_heights');
    if (s) laneHeights = JSON.parse(s);
  } catch(e) {}
}
function saveLaneHeights() {
  localStorage.setItem('kanban_lane_heights', JSON.stringify(laneHeights));
}
function getLaneHeight(laneId) {
  return laneHeights[laneId] || DEFAULT_LANE_HEIGHT;
}

// ── Swimlane resizer logic ──
let resizeState = null;
function setupLaneResizers() {
  document.querySelectorAll('.swimlane-resizer').forEach(handle => {
    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      const prevLane = handle.previousElementSibling;
      const nextLane = handle.nextElementSibling;
      if (!prevLane || !nextLane) return;
      const prevId = prevLane.dataset.lane;
      const nextId = nextLane.dataset.lane;
      const startY = e.clientY;
      const startPrevH = prevLane.offsetHeight;
      const startNextH = nextLane.offsetHeight;
      handle.classList.add('active');
      resizeState = { handle, prevLane, nextLane, prevId, nextId, startY, startPrevH, startNextH };
    });
    // Double-click to reset both lanes to default height (all columns)
    handle.addEventListener('dblclick', () => {
      const prevLane = handle.previousElementSibling;
      const nextLane = handle.nextElementSibling;
      if (!prevLane || !nextLane) return;
      const prevId = prevLane.dataset.lane;
      const nextId = nextLane.dataset.lane;
      applyLaneHeightAll(prevId, DEFAULT_LANE_HEIGHT);
      applyLaneHeightAll(nextId, DEFAULT_LANE_HEIGHT);
      laneHeights[prevId] = DEFAULT_LANE_HEIGHT;
      laneHeights[nextId] = DEFAULT_LANE_HEIGHT;
      saveLaneHeights();
    });
  });
}

// Apply height to all columns' swimlanes with the same lane id
function applyLaneHeightAll(laneId, height) {
  document.querySelectorAll(`.swimlane[data-lane="${laneId}"]`).forEach(el => {
    el.style.height = height + 'px';
  });
}

document.addEventListener('mousemove', e => {
  if (!resizeState) return;
  e.preventDefault();
  const { prevId, startY, startPrevH } = resizeState;
  const dy = e.clientY - startY;
  const newPrevH = Math.max(80, startPrevH + dy);
  applyLaneHeightAll(prevId, newPrevH);
});

document.addEventListener('mouseup', () => {
  if (!resizeState) return;
  const { handle, prevId } = resizeState;
  handle.classList.remove('active');
  const prevEl = document.querySelector(`.swimlane[data-lane="${prevId}"]`);
  if (prevEl) laneHeights[prevId] = prevEl.offsetHeight;
  saveLaneHeights();
  resizeState = null;
});

function getLaneId(t) {
  const lid = t.lane || (t.category === 'work' ? 'work' : 'personal');
  return lanesConfig.some(l => l.id === lid) ? lid : (lanesConfig[0]?.id ?? 'personal');
}

const CAT = { daily:'Daily', work:'Work', study:'Study', personal:'Personal', kids:'Kids', other:'Other' };
const NEXT = { todo:'doing', doing:'done', done:'todo' };
const TABS_M = ['todo', 'doing', 'done'];

// ── Device detection ──
const isMobile = () => window.matchMedia('(max-width: 768px)').matches;

// ── Button helpers ──
const laneIcon  = c => c === 'work' ? '💼' : '👤';
const laneTitle = c => c === 'work' ? '個人に移動' : '仕事に移動';

function cardActionBtns(t) {
  return `
    <button class="card-btn pin-btn" onclick="togglePin('${t.id}')" title="${t.pinned?'Unpin':'Pin'}"><span class="pin-icon">📌</span></button>
    <button class="card-btn ai-btn${t.ai?' active':''}" onclick="toggleAi('${t.id}')" title="${t.ai?'AIフラグ解除':'AIにお願い'}">🤖</button>
    <button class="card-btn delete-btn" onclick="deleteTask('${t.id}')" title="Delete">&#x2715;</button>
  `;
}

function setQuickBtn(btn, bar, text, cls, handler) {
  btn.textContent = text; btn.className = cls; btn.onclick = handler; bar.style.display = 'block';
}

// ── Firebase helpers ──
async function saveTask(t) { const {id,...d} = t; await setDoc(doc(db,'tasks',id), d); }
async function removeTask(id) { await deleteDoc(doc(db,'tasks',id)); }

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s) { const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }
function getDateStr(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getTopOrder(status) {
  const col = tasks.filter(t => t.status === status);
  if (!col.length) return 0;
  return Math.min(...col.map(t => t.order ?? 999999)) - 1;
}
function sortTasks(list) {
  return list.slice().sort((a,b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    const oa = a.order ?? 999999, ob = b.order ?? 999999;
    if (oa !== ob) return oa - ob;
    return a.created - b.created;
  });
}

// Due badge (mobile=false → desktop div, mobile=true → span)
function dueBadge(due, mobile = false) {
  if (!due) return '';
  const today = getDateStr(Date.now());
  const diff = (new Date(due) - new Date(today)) / 86400000;
  const [tag, cls] = mobile ? ['span', 'card-due-m'] : ['div', 'card-due'];
  if (diff < 0)  return `<${tag} class="${cls} overdue">⚠ 期限切れ ${due}</${tag}>`;
  if (diff <= 3) return `<${tag} class="${cls} soon">⏰ 期日 ${due}</${tag}>`;
  return `<${tag} class="${cls} ok">📅 ${due}</${tag}>`;
}

// Task counts helper
function getTaskCounts() {
  return {
    todo:  tasks.filter(t => t.status === 'todo').length,
    doing: tasks.filter(t => t.status === 'doing').length,
    done:  tasks.filter(t => t.status === 'done').length,
    total: tasks.length,
  };
}

// Status transition helper — returns true if celebrate should fire
function transitionStatus(task, newStatus) {
  const shouldCelebrate = task.status !== 'done' && newStatus === 'done';
  task.status = newStatus;
  task.updatedAt = Date.now();
  if (newStatus === 'done') { task.pinned = false; task.doneAt = task.doneAt || Date.now(); }
  else { task.doneAt = null; }
  return shouldCelebrate;
}

// ════════════════════════════════════════
// DESKTOP LOGIC
// ════════════════════════════════════════
let desktopEditingId = null;
let dragId = null;

// ── Desktop Card HTML helper ──
function desktopCardHtml(t) {
  return `
    <div class="card card-cat-${t.category} ${t.pinned ? 'pinned' : ''}" draggable="true" data-id="${t.id}"
         ondragstart="onDragStart(event)" ondragend="onDragEnd(event)" ondblclick="openDesktopModal('${t.id}')">
      <div class="card-top">
        <span class="card-category cat-${t.category}">${CAT[t.category]}</span>
        <div class="card-actions">${cardActionBtns(t)}</div>
      </div>
      <div class="card-body">
        <div class="card-body-left">
          <div class="card-title">${t.repeat ? '<span style="font-size:0.7rem">🔄</span> ' : ''}${t.ai ? '<span style="font-size:0.7rem; margin-left:2px;">🤖</span> ' : ''}${esc(t.title)}</div>
          ${t.desc ? `<div class="card-desc">${esc(t.desc)}</div>` : ''}
          ${dueBadge(t.due)}
        </div>
      </div>
    </div>
  `;
}

// ── Desktop Render ──
function desktopRender() {
  ['todo','doing','done'].forEach(status => {
    const col = document.getElementById('col-' + status);
    if (!col) return;
    let visible;
    if (status === 'done') {
      visible = tasks.filter(t => t.status === 'done')
        .sort((a,b) => (b.doneAt||0) - (a.doneAt||0)).slice(0, 9);
    } else {
      visible = tasks.filter(t => t.status === status);
    }
    const count = visible.length;
    const countEl = document.getElementById('count-' + status);
    if (countEl) countEl.textContent = count;

    const filtered = sortTasks(visible.filter(t => currentFilter === 'all' || t.category === currentFilter));

    col.innerHTML = lanesConfig.map((lane, idx) => {
      const laneTasks = filtered.filter(t => getLaneId(t) === lane.id);
      const canDel = lanesConfig.length > 1;
      const isLast = idx === lanesConfig.length - 1;
      const h = getLaneHeight(lane.id);
      const resizer = !isLast ? `<div class="swimlane-resizer"></div>` : '';
      const heightStyle = !isLast ? `style="height:${h}px"` : '';
      return `
        <div class="swimlane" data-lane="${lane.id}" ${heightStyle}>
          <div class="swimlane-header">
            <span class="lane-name-label" onclick="startRenaming('${lane.id}', this)" title="クリックで名前を変更">${esc(lane.name)}</span>
            ${canDel ? `<button class="swimlane-del-btn" onclick="deleteLane('${lane.id}')" title="レーンを削除">✕</button>` : ''}
          </div>
          <div class="swimlane-body" data-status="${status}" data-lane="${lane.id}">
            ${laneTasks.length > 0
              ? laneTasks.map(t => desktopCardHtml(t)).join('')
              : `<div class="empty-state" style="padding:12px 4px; font-size:0.75rem;">-</div>`}
          </div>
        </div>${resizer}`;
    }).join('');
  });

  const { todo: todoCount, doing: doingCount, done: doneCount } = getTaskCounts();
  const statsEl = document.getElementById('stats');
  if (statsEl) statsEl.innerHTML = `
    <span><span class="stat-dot" style="background:var(--todo)"></span> ${todoCount} Todo</span>
    <span><span class="stat-dot" style="background:var(--doing)"></span> ${doingCount} Doing</span>
    <span><span class="stat-dot" style="background:var(--done)"></span> ${doneCount} Done</span>
  `;

  // Re-attach drag & drop to newly rendered swimlane bodies
  setupDragDrop();
  setupLaneResizers();

  // Equalize last lane height across all 3 columns
  if (lanesConfig.length > 0) {
    const lastLaneId = lanesConfig[lanesConfig.length - 1].id;
    const lastLanes = document.querySelectorAll(`.swimlane[data-lane="${lastLaneId}"]`);
    let maxH = 0;
    lastLanes.forEach(el => { if (el.scrollHeight > maxH) maxH = el.scrollHeight; });
    lastLanes.forEach(el => { el.style.minHeight = maxH + 'px'; });
  }
}

// ── Desktop Modal (new: id=null, edit: id=string) ──
function openDesktopModal(id = null) {
  desktopEditingId = id;
  const task = id ? tasks.find(t => t.id === id) : null;
  document.getElementById('modalTitle').textContent  = task ? 'Edit Task' : 'New Task';
  document.getElementById('modalSubmit').textContent = task ? 'Save' : 'Add Task';
  document.getElementById('taskTitle').value         = task?.title    ?? '';
  document.getElementById('taskDesc').value          = task?.desc     ?? '';
  const laneSelect = document.getElementById('taskLane');
  laneSelect.innerHTML = lanesConfig.map(l => `<option value="${l.id}">${esc(l.name)}</option>`).join('');
  laneSelect.value = task ? getLaneId(task) : (lanesConfig[0]?.id ?? 'personal');
  document.getElementById('taskCat').value           = task?.category ?? 'work';
  document.getElementById('taskStatus').value        = task?.status   ?? 'todo';

// ── Desktop Drag & Drop ──
function onDragStart(e) {
  const card = e.target.closest('.card');
  dragId = card.dataset.id;
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragId);
}
function onDragEnd(e) {
  const card = e.target.closest('.card');
  if (card) card.classList.remove('dragging');
  document.querySelectorAll('.swimlane-body').forEach(c => c.classList.remove('drag-over'));
  document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
  dragId = null;
}
function getDropIndex(col, y) {
  const cards = [...col.querySelectorAll('.card:not(.dragging)')];
  for (let i = 0; i < cards.length; i++) {
    const rect = cards[i].getBoundingClientRect();
    if (y < rect.top + rect.height / 2) return i;
  }
  return cards.length;
}

// Set up drag & drop on swimlane bodies
function setupDragDrop() {
  document.querySelectorAll('.swimlane-body').forEach(lane => {
    lane.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      lane.classList.add('drag-over');
      lane.querySelectorAll('.drop-indicator').forEach(el => el.remove());
      const idx = getDropIndex(lane, e.clientY);
      const cards = [...lane.querySelectorAll('.card:not(.dragging)')];
      const indicator = document.createElement('div');
      indicator.className = 'drop-indicator';
      if (idx < cards.length) lane.insertBefore(indicator, cards[idx]);
      else lane.appendChild(indicator);
    });

    lane.addEventListener('dragleave', e => {
      if (!lane.contains(e.relatedTarget)) {
        lane.classList.remove('drag-over');
        lane.querySelectorAll('.drop-indicator').forEach(el => el.remove());
      }
    });

    lane.addEventListener('drop', async e => {
      e.preventDefault();
      lane.classList.remove('drag-over');
      lane.querySelectorAll('.drop-indicator').forEach(el => el.remove());
      if (!dragId) return;
      const newStatus = lane.dataset.status;
      const newLane   = lane.dataset.lane;
      const task = tasks.find(t => t.id === dragId);
      if (!task) return;
      task.lane = newLane;
      const shouldCelebrate = transitionStatus(task, newStatus);
      const dropIdx = getDropIndex(lane, e.clientY);
      const laneTasks = sortTasks(tasks.filter(t => t.status === newStatus && t.id !== dragId && getLaneId(t) === newLane && (currentFilter === 'all' || t.category === currentFilter)));
      const reordered = [...laneTasks];
      reordered.splice(dropIdx, 0, task);
      reordered.forEach((t, i) => { t.order = i; });
      desktopRender();
      for (const t of reordered) await saveTask(t);
      if (shouldCelebrate) celebrate();
    });
  });
}

// ── Mobile Render ──
function mobileRender() {
  const query = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  const content = document.getElementById('mobileContent');
  if (!content) return;

  const { todo: todoCount, doing: doingCount, done: doneCount, total } = getTaskCounts();
  const pct = total > 0 ? Math.round(doneCount / total * 100) : 0;

  const progFill  = document.getElementById('progFill');
  const progLabel = document.getElementById('progLabel');
  const progStats = document.getElementById('progStats');
  if (progFill)  progFill.style.width = pct + '%';
  if (progLabel) progLabel.textContent = `${pct}% 完了`;
  if (progStats) progStats.textContent = `📋${todoCount} ▶${doingCount} ✓${doneCount}`;

  const cntTodo  = document.getElementById('cnt-todo');
  const cntDoing = document.getElementById('cnt-doing');
  const cntDone  = document.getElementById('cnt-done');
  if (cntTodo)  cntTodo.textContent  = todoCount;
  if (cntDoing) cntDoing.textContent = doingCount;
  if (cntDone)  cntDone.textContent  = doneCount;

  let visible = tasks.filter(t => t.status === currentTab);
  if (currentTab === 'done') {
    visible = visible.sort((a,b) => (b.doneAt||0) - (a.doneAt||0));
  }
  let filtered = visible.filter(t =>
    (currentFilter === 'all' || t.category === currentFilter) &&
    (!query || t.title.toLowerCase().includes(query) || (t.desc||'').toLowerCase().includes(query))
  );
  filtered = sortTasks(filtered);

  if (filtered.length === 0) {
    const msgs  = { todo:'まだタスクがありません', doing:'進行中のタスクはありません', done:'完了したタスクはありません' };
    const icons = { todo:'📝', doing:'⚡', done:'🎉' };
    content.innerHTML = `<div class="empty"><div class="empty-icon">${icons[currentTab]}</div><p>${msgs[currentTab]}</p></div>`;
    return;
  }


  const personalTasks = filtered.filter(t => t.category !== 'work');
  const workTasks     = filtered.filter(t => t.category === 'work');

  let html = '';
  if (workTasks.length > 0) {
    html += `<div class="m-swimlane" data-lane="work"><div class="m-swimlane-header">💼 仕事</div>${workTasks.map(mobileCardHtml).join('')}</div>`;
  }
  if (personalTasks.length > 0) {
    html += `<div class="m-swimlane" data-lane="personal"><div class="m-swimlane-header">👤 個人</div>${personalTasks.map(mobileCardHtml).join('')}</div>`;
  }
  content.innerHTML = html;
}

// ── Swipe gestures (Mobile) ──
let swipeState = {};
const SWIPE_THRESHOLD = 72;

function swipeStart(e, id) {
  swipeState[id] = {
    startX: e.touches[0].clientX, startY: e.touches[0].clientY,
    dir: null, delta: 0, target: e.target
  };
}
function swipeMove(e, id) {
  const s = swipeState[id];
  if (!s) return;
  const dx = e.touches[0].clientX - s.startX;
  const dy = e.touches[0].clientY - s.startY;
  if (!s.dir) {
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) s.dir = 'h';
    else if (Math.abs(dy) > 8) s.dir = 'v';
  }
  if (s.dir === 'h') e.preventDefault();
}
async function swipeEnd(e, id) {
  const s = swipeState[id];
  if (!s) return;
  delete swipeState[id];
  if (s.dir === null) {
    if (!s.target.closest('.card-menu-btn')) openSheet(id);
  }
}

// ── Pull to refresh (Mobile) ──
const mobileContentEl = document.getElementById('mobileContent');
const ptrEl = document.getElementById('ptr');
const ptrSpinner = document.getElementById('ptrSpinner');
const ptrLabel = document.getElementById('ptrLabel');
let ptrStartY = null;
const PTR_THRESHOLD = 64;

if (mobileContentEl) {
  mobileContentEl.addEventListener('touchstart', e => {
    if (mobileContentEl.scrollTop === 0) ptrStartY = e.touches[0].clientY;
  }, { passive: true });
  mobileContentEl.addEventListener('touchmove', e => {
    if (ptrStartY === null) return;
    if (mobileContentEl.scrollTop > 0) { ptrStartY = null; return; }
    const dy = e.touches[0].clientY - ptrStartY;
    if (dy <= 0) { ptrStartY = null; return; }
    const ready = dy >= PTR_THRESHOLD;
    if (ptrSpinner) ptrSpinner.textContent = ready ? '↑' : '↓';
    if (ptrLabel)   ptrLabel.textContent   = ready ? '離して更新' : '引っ張って更新';
    if (ptrEl) { ptrEl.classList.toggle('ready', ready); ptrEl.classList.add('visible'); }
  }, { passive: true });
  mobileContentEl.addEventListener('touchend', async e => {
    if (ptrStartY === null) return;
    const dy = e.changedTouches[0].clientY - ptrStartY;
    ptrStartY = null;
    if (dy >= PTR_THRESHOLD) {
      if (ptrSpinner) ptrSpinner.textContent = '🔄';
      if (ptrLabel)   ptrLabel.textContent   = '更新中…';
      if (ptrEl) { ptrEl.classList.remove('ready'); ptrEl.classList.add('loading'); }
      mobileRender();
      await new Promise(r => setTimeout(r, 700));
      if (ptrEl) ptrEl.classList.remove('loading');
    }
    if (ptrEl) ptrEl.classList.remove('visible', 'ready');
  }, { passive: true });

  // Tab swipe
  let tabSwipeStart = null;
  mobileContentEl.addEventListener('touchstart', e => {
    tabSwipeStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  mobileContentEl.addEventListener('touchend', e => {
    if (!tabSwipeStart) return;
    const dx = e.changedTouches[0].clientX - tabSwipeStart.x;
    const dy = e.changedTouches[0].clientY - tabSwipeStart.y;
    tabSwipeStart = null;
    if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx) * 0.8) return;
    const idx = TABS_M.indexOf(currentTab);
    if (dx < 0 && idx < TABS_M.length - 1) switchTab(TABS_M[idx + 1], 'right');
    else if (dx > 0 && idx > 0)            switchTab(TABS_M[idx - 1], 'left');
  }, { passive: true });
}

  if (lanesConfig.length <= 1) return;
  const lane = lanesConfig.find(l => l.id === laneId);
  const taskCount = tasks.filter(t => getLaneId(t) === laneId).length;
  const msg = taskCount > 0
    ? `「${lane.name}」を削除しますか？\nこのレーンのタスク ${taskCount} 件は「${lanesConfig.find(l=>l.id!==laneId)?.name}」に移動されます。`
    : `「${lane.name}」を削除しますか？`;
  if (!confirm(msg)) return;
  const fallback = lanesConfig.find(l => l.id !== laneId)?.id ?? 'personal';
  tasks.forEach(t => { if (getLaneId(t) === laneId) { t.lane = fallback; t.updatedAt = Date.now(); } });

  delete laneHeights[laneId];
  saveLanes();

  Promise.all(tasks.filter(t => t.lane === fallback && t.updatedAt === Date.now()).map(t => saveTask(t)));
  desktopRender();
}

    t.repeat === true &&
    t.status === 'done' &&
    t.doneAt &&
    getDateStr(t.doneAt) !== today
  );
  for (const t of toReset) {
    t.status = 'todo';
    t.doneAt = null;
    t.updatedAt = Date.now();
    await saveTask(t);
  }
  if (toReset.length > 0) render();
}

// ── Confetti ──
function celebrate() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const colors = ['#f59e0b','#3b82f6','#10b981','#8b5cf6','#ec4899','#ef4444','#06b6d4'];
  const particles = [];
  for (let i = 0; i < 90; i++) {
    particles.push({
      x: Math.random() * canvas.width, y: -20 - Math.random() * 80,
      w: 6 + Math.random()*6, h: 4 + Math.random()*4,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random()-.5)*4, vy: 2+Math.random()*4,
      rot: Math.random()*Math.PI*2, vr: (Math.random()-.5)*.15, life: 1
    });
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    particles.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.rot+=p.vr; p.life-=0.008;
      if (p.life <= 0) return;
      alive = true;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore();
    });
    if (alive) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

// ── Keyboard handlers ──
document.addEventListener('keydown', e => {
  if (e.isComposing || e.keyCode === 229) return;
  if (e.key === 'Escape') {
    closeModal();
    closeSheet();
    return;
  }
  // Desktop: Enter submits modal
  const desktopModalActive = document.getElementById('desktopModal')?.classList.contains('active');
  if (e.key === 'Enter' && desktopModalActive && !isMobile()) {
    if (document.activeElement.tagName !== 'TEXTAREA') desktopSubmitTask();
  }
  // Mobile: Enter handling for iOS IME
  if (e.key === 'Enter') {
    const active = document.activeElement;
    const overlayOpen = document.getElementById('overlay')?.classList.contains('open');
    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA') && overlayOpen) {
      e.preventDefault(); active.blur(); active.focus();
    }
  }
});

// ── Pressure forecast widget ──
async function loadPressureForecast() {
  try {
    const LAT = 35.68184, LON = 140.04152;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`
      + `&hourly=pressure_msl&daily=weather_code&timezone=Asia%2FTokyo&forecast_days=7`;
    const res = await fetch(url);
    const data = await res.json();
    const WMO = {0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌧',53:'🌧',55:'🌧',
      61:'🌧',63:'🌧',65:'🌧',71:'🌨',73:'🌨',75:'🌨',80:'🌦',81:'🌦',82:'🌧',95:'⛈',96:'⛈',99:'⛈'};
    const DAYS = ['日','月','火','水','木','金','土'];

    // Aggregate hourly → daily avg pressure
    const dailyP = {};
    data.hourly.time.forEach((t, i) => {
      const d = t.slice(0,10), p = data.hourly.pressure_msl[i];
      if (p == null) return;
      if (!dailyP[d]) dailyP[d] = [];
      dailyP[d].push(p);
    });

    const days = data.daily.time.map((d, i) => {
      const ps = dailyP[d] || [];
      return {
        date: d,
        avg: ps.length ? Math.round(ps.reduce((a,b)=>a+b,0)/ps.length) : null,
        icon: WMO[data.daily.weather_code[i]] || '❓',
      };
    });

    // Build HTML
    const widget = document.getElementById('pressureWidget');
    if (!widget) return;

    let html = '<span class="pressure-widget-label">気圧予報</span>';
    days.forEach((d, i) => {
      const diff = i > 0 ? d.avg - days[i-1].avg : 0;
      const warn = d.avg < 1005 || (i > 0 && diff <= -8);
      const dt = new Date(d.date);
      const dayName = DAYS[dt.getDay()];
      const isToday = i === 0;
      const diffStr = i === 0 ? '' : (diff > 0 ? '+' + diff : '' + diff);
      const diffClass = diff <= -8 ? 'drop' : diff >= 5 ? 'rise' : '';

      html += `<div class="pw-day${isToday ? ' today' : ''}${warn ? ' warn' : ''}">
        <div class="pw-date">${d.date.slice(5)} (${dayName})</div>
        <div class="pw-icon">${d.icon}</div>
        <div class="pw-hpa">${d.avg}</div>
        ${diffStr ? `<div class="pw-diff ${diffClass}">${diffStr}</div>` : '<div class="pw-diff">today</div>'}
      </div>`;
    });
    widget.innerHTML = html;
  } catch (e) {
    console.warn('気圧予報の取得に失敗:', e);
  }
}

// ── Init ──
async function init() {
  loadLanes();
  loadLaneHeights();
  // Set up desktop drag & drop
  setupDragDrop();
  // Load pressure forecast (non-blocking)
  loadPressureForecast();

  // Set initial mobile tab background
  if (isMobile()) {
    document.body.classList.add('tab-todo');
  }

  let firstLoad = true;
  onSnapshot(tasksCol, async snapshot => {
    tasks = snapshot.docs
      .map(d => ({ id:d.id, ...d.data() }))
      .filter(t => !pendingDeletes.has(t.id));
    // Migrate: health → personal
    const toMigrate = tasks.filter(t => t.category === 'health');
    for (const t of toMigrate) { t.category = 'personal'; await saveTask(t); }
    render();
    if (firstLoad) {
      firstLoad = false;
      await processRepeats();
      render();
    }
  });
}

// Auth state handler
let initialized = false;
onAuthStateChanged(auth, async (user) => {
  if (user && !initialized) {
    initialized = true;
    currentUser = user;
    // Hide login screen, show app
    document.getElementById('loginScreen').style.display = 'none';
    // Show user info (desktop)
    const userInfo = document.getElementById('userInfo');
    if (userInfo) {
      userInfo.style.display = 'flex';
      document.getElementById('userAvatar').src = user.photoURL || '';
    }
    // Show user info (mobile)
    const userInfoMobile = document.getElementById('userInfoMobile');
    if (userInfoMobile) {
      userInfoMobile.style.display = 'flex';
      document.getElementById('userAvatarMobile').src = user.photoURL || '';
    }
    // Log UID to console for first-time Firestore rules setup
    console.log('✅ ログイン成功 UID:', user.uid);
    await init();
  } else {
    currentUser = null;
    document.getElementById('loginScreen').style.display = 'flex';
  }
});
