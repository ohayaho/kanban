<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kanban Board</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%236366f1'/><stop offset='100%25' stop-color='%238b5cf6'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23g)'/><rect x='10' y='14' width='10' height='36' rx='3' fill='white' opacity='0.9'/><rect x='27' y='14' width='10' height='24' rx='3' fill='white' opacity='0.7'/><rect x='44' y='14' width='10' height='16' rx='3' fill='white' opacity='0.5'/></svg>">
<style>
/* ── CSS Variables ── */
:root {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --surface-hover: #e2e8f0;
  --border: #e2e8f0;
  --text: #1e293b;
  --text-muted: #64748b;
  --todo: #f59e0b;
  --doing: #3b82f6;
  --done: #10b981;
  --accent: #6366f1;
  --cat-work: #8b5cf6;
  --cat-daily: #d97706;
  --cat-personal: #ec4899;
  --cat-study: #0e7490;
  --cat-kids: #2e7d32;
  --cat-other: #64748b;
  --radius: 10px;
  --shadow: 0 4px 16px rgba(0,0,0,0.08);
  --tab-h: 68px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

/* ════════════════════════════════════════
   SHARED STYLES (both desktop and mobile)
   ════════════════════════════════════════ */

/* Category badge colors */
.cat-work    { background: rgba(139,92,246,0.15); color: var(--cat-work); }
.cat-daily   { background: rgba(217,119,6,0.15); color: var(--cat-daily); }
.cat-personal { background: rgba(236,72,153,0.15); color: var(--cat-personal); }
.cat-study   { background: rgba(14,116,144,0.15); color: var(--cat-study); }
.cat-kids    { background: rgba(46,125,50,0.15); color: var(--cat-kids); }
.cat-other   { background: rgba(100,116,139,0.15); color: var(--cat-other); }

/* Celebration canvas */
.confetti-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 300;
}

/* ════════════════════════════════════════
   DESKTOP STYLES (min-width: 769px)
   ════════════════════════════════════════ */
@media (min-width: 769px) {
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
  }

  /* Header */
  header {
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 1.3rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--todo), var(--doing), var(--done));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-stats {
    display: flex;
    gap: 16px;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .header-stats span { display: flex; align-items: center; gap: 4px; }
  .stat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .header-buttons { display: flex; gap: 8px; }
  .btn-add {
    padding: 10px 20px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-add:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,0.4); }
  .btn-add:active { transform: scale(0.97); }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 6px;
    padding: 16px 28px 0;
    flex-wrap: wrap;
  }
  .filter-chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .filter-chip:hover { border-color: rgba(0,0,0,0.2); }
  .filter-chip.active { background: rgba(99,102,241,0.15); border-color: #6366f1; color: #4f46e5; }

  /* Repeat Templates Section */
  .repeat-section {
    margin: 14px 14px 0;
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .repeat-header {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .repeat-header:hover { background: var(--bg); }
  .repeat-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text-muted);
  }
  .repeat-toggle {
    font-size: 0.7rem;
    transition: transform 0.2s;
    display: inline-block;
  }
  .repeat-toggle.open { transform: rotate(90deg); }
  .repeat-body { display: none; padding: 0 14px 12px; }
  .repeat-body.open { display: block; }
  .repeat-items { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .repeat-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.78rem;
  }
  .repeat-item .ri-cat {
    font-size: 0.62rem;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
  }
  .repeat-item .ri-title { font-weight: 600; }
  .repeat-item .ri-delete {
    background: none; border: none;
    color: var(--text-muted); cursor: pointer;
    font-size: 0.72rem; padding: 0 2px; line-height: 1;
  }
  .repeat-item .ri-delete:hover { color: #ef4444; }
  .repeat-add { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .repeat-add input {
    flex: 1; min-width: 120px;
    padding: 6px 10px;
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.82rem;
    background: var(--bg); color: var(--text);
  }
  .repeat-add input:focus { outline: none; border-color: #6366f1; }
  .repeat-add select {
    padding: 6px 8px;
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.78rem;
    background: var(--bg); color: var(--text);
  }
  .repeat-add button {
    padding: 6px 14px;
    background: #6366f1; color: #fff;
    border: none; border-radius: 6px;
    font-size: 0.78rem; font-weight: 600; cursor: pointer;
  }
  .repeat-add button:hover { background: #4f46e5; }
  .repeat-hint { font-size: 0.7rem; color: var(--text-muted); margin-top: 6px; }

  /* Board */
  .board {
    display: flex;
    gap: 14px;
    padding: 14px;
    min-height: calc(100vh - 80px);
    align-items: stretch;
    justify-content: center;
  }

  /* Column */
  .column {
    flex: 1 1 0;
    min-width: 200px;
    max-width: 30vw;
    background: #ffffff;
    border-radius: 14px;
    border: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .column-header {
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 700;
    font-size: 0.85rem;
    border-bottom: 2px solid var(--border);
  }
  .column-header .col-label { display: flex; align-items: center; gap: 8px; }
  .column-header .col-icon { width: 10px; height: 10px; border-radius: 50%; }
  .column-header .col-count {
    font-size: 0.75rem; font-weight: 600;
    padding: 2px 8px; border-radius: 10px;
    background: rgba(255,255,255,0.06); color: var(--text-muted);
  }
  .column[data-status="todo"]  .col-icon { background: var(--todo);  box-shadow: 0 0 8px var(--todo); }
  .column[data-status="doing"] .col-icon { background: var(--doing); box-shadow: 0 0 8px var(--doing); }
  .column[data-status="done"]  .col-icon { background: var(--done);  box-shadow: 0 0 8px var(--done); }

  .column-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Swimlane structure */
  .swimlane {
    display: flex;
    flex-direction: column;
  }
  .swimlane + .swimlane {
    border-top: 1px solid var(--border);
  }
  .swimlane-header {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text-muted);
    padding: 4px 8px 2px;
    user-select: none;
    letter-spacing: 0.3px;
    flex-shrink: 0;
  }
  .swimlane-body {
    padding: 4px 8px 8px;
    min-height: 48px;
    flex: 1;
    transition: background 0.2s;
  }
  .swimlane-body.drag-over { background: rgba(99,102,241,0.05); }

  /* Desktop Card */
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 8px;
    margin-bottom: 5px;
    cursor: grab;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    position: relative;
  }
  .card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  .card.dragging { opacity: 0.4; transform: rotate(2deg); }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .card-category {
    font-size: 0.62rem; font-weight: 700;
    padding: 1px 6px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  /* Desktop Card backgrounds by category */
  .card.card-cat-work     { background: #c8bde6; border-color: #a99ad0; }
  .card.card-cat-daily    { background: #fde68a; border-color: #f59e0b; }
  .card.card-cat-personal { background: #f5c0da; border-color: #e898bf; }
  .card.card-cat-study    { background: #a0d4db; border-color: #80bac2; }
  .card.card-cat-kids     { background: #bcd898; border-color: #a2c478; }
  .card.card-cat-other    { background: #b8bec5; border-color: #98a0a8; }

  .card-actions { display: flex; gap: 2px; align-items: center; }
  .card-btn {
    background: none; border: none;
    color: var(--text-muted); font-size: 0.72rem;
    cursor: pointer; padding: 1px 4px; border-radius: 4px;
    opacity: 0; transition: opacity 0.15s, color 0.15s, background 0.15s; line-height: 1;
  }
  .card:hover .card-btn { opacity: 1; }
  .card-btn.pin-btn:hover    { color: var(--todo);  background: rgba(245,158,11,0.1); }
  .card-btn.delete-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
  .card.pinned .pin-btn { opacity: 1; color: var(--todo); }
  .card .pin-icon { font-size: 0.78rem; }

  .drop-indicator { height: 3px; background: #6366f1; border-radius: 2px; margin: -2px 0; pointer-events: none; }

  .card-body { display: flex; align-items: flex-start; gap: 6px; }
  .card-body-left { flex: 1; min-width: 0; }
  .card-title { font-size: 0.8rem; font-weight: 600; line-height: 1.4; word-break: break-word; }
  .card-desc  { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; line-height: 1.4; word-break: break-word; }
  .card-due   { font-size: 0.65rem; margin-top: 3px; font-weight: 600; }
  .card-due.overdue { color: #ef4444; }
  .card-due.soon    { color: #f59e0b; }
  .card-due.ok      { color: #64748b; }

  .column[data-status="done"] .card-title { text-decoration: line-through; color: var(--text-muted); }

  .empty-state { text-align: center; color: var(--text-muted); font-size: 0.82rem; padding: 30px 10px; opacity: 0.6; }

  /* Desktop Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 90%; max-width: 440px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    animation: modalIn 0.2s ease-out;
  }
  @keyframes modalIn { from { opacity: 0; transform: translateY(16px) scale(0.97); } }
  .modal h2 { font-size: 1.1rem; margin-bottom: 20px; font-weight: 700; }
  .modal label {
    display: block; font-size: 0.82rem; font-weight: 600;
    color: var(--text-muted); margin-bottom: 6px; margin-top: 14px;
  }
  .modal label:first-of-type { margin-top: 0; }
  .modal input, .modal textarea, .modal select {
    width: 100%; padding: 10px 14px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 0.92rem; font-family: inherit; transition: border-color 0.15s;
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: #6366f1; }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal select option { background: var(--surface); }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
  .modal-actions button {
    padding: 10px 22px; border-radius: 8px; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; border: none; transition: transform 0.1s;
  }
  .modal-actions button:active { transform: scale(0.97); }
  .btn-cancel { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border) !important; }
  .btn-cancel:hover { background: var(--surface-hover); }
  .btn-submit { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
  .btn-submit:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.4); }

  /* Hide mobile-only elements on desktop */
  .mobile-header, .mobile-content, .tab-bar, .fab,
  .overlay, .confirm-overlay, .ctx-overlay, .ctx-menu,
  .toast, .ptr { display: none !important; }
}

/* ════════════════════════════════════════
   MOBILE STYLES (max-width: 768px)
   ════════════════════════════════════════ */
@media (max-width: 768px) {
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans JP', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Hide desktop-only elements on mobile */
  .desktop-header, .filter-bar, .repeat-section,
  .board, .modal-overlay { display: none !important; }

  /* ── Mobile Header ── */
  .mobile-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    padding-top: var(--safe-t);
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
  }
  .header-title {
    font-size: 1.1rem; font-weight: 800;
    background: linear-gradient(135deg, var(--todo), var(--doing), var(--done));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-btns { display: flex; gap: 4px; }
  .icon-btn {
    background: none; border: none;
    color: var(--text-muted); font-size: 1.15rem;
    cursor: pointer; padding: 6px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .icon-btn:active { background: var(--bg); }

  /* Progress */
  .progress-wrap { padding: 0 16px 8px; }
  .progress-row {
    display: flex; justify-content: space-between;
    font-size: 0.7rem; color: var(--text-muted);
    margin-bottom: 5px; font-weight: 600;
  }
  .progress-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--todo), var(--doing), var(--done));
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  /* Search */
  .search-bar { display: none; padding: 0 12px 8px; gap: 8px; align-items: center; }
  .search-bar.open { display: flex; }
  .search-input-wrap {
    flex: 1; display: flex; align-items: center; gap: 8px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 8px 12px; transition: border-color 0.15s;
  }
  .search-input-wrap:focus-within { border-color: var(--accent); }
  .search-input-wrap span { color: var(--text-muted); font-size: 0.9rem; }
  .search-input { flex: 1; border: none; background: none; font-size: 0.9rem; color: var(--text); outline: none; }
  .search-input::placeholder { color: var(--text-muted); }
  .search-clear { background: none; border: none; color: var(--text-muted); font-size: 0.85rem; cursor: pointer; padding: 2px; }

  /* Category chips */
  .chips-scroll {
    display: flex; gap: 6px; overflow-x: auto;
    padding: 0 16px 10px; scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  .chips-scroll::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; padding: 5px 14px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 600; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--surface); color: var(--text-muted);
    transition: all 0.15s; white-space: nowrap;
  }
  .chip.active { background: rgba(99,102,241,0.1); border-color: var(--accent); color: var(--accent); }

  /* ── Mobile Content ── */
  .mobile-content {
    flex: 1; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
    padding: 10px 12px calc(10px + var(--tab-h) + var(--safe-b) + 72px);
  }

  /* Empty state */
  .empty { text-align: center; color: var(--text-muted); padding: 70px 20px; }
  .empty-icon { font-size: 2.8rem; margin-bottom: 12px; opacity: 0.5; }
  .empty p { font-size: 0.85rem; opacity: 0.7; }

  /* ── Mobile Card ── */
  .swipe-wrap { position: relative; margin-bottom: 8px; }
  .swipe-bg {
    position: absolute; inset: 0; border-radius: 14px;
    display: flex; align-items: center; padding: 0 18px;
    font-size: 1.1rem; pointer-events: none; opacity: 0;
  }
  .swipe-bg.right { background: var(--doing); justify-content: flex-start; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px 10px 18px;
    position: relative; overflow: hidden;
    touch-action: pan-y; user-select: none; will-change: transform;
  }
  .card::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 5px;
    border-radius: 14px 0 0 14px;
  }
  .card.cc-work::before     { background: var(--cat-work); }
  .card.cc-daily::before    { background: var(--cat-daily); }
  .card.cc-study::before    { background: var(--cat-study); }
  .card.cc-personal::before { background: var(--cat-personal); }
  .card.cc-kids::before     { background: var(--cat-kids); }
  .card.cc-other::before    { background: var(--cat-other); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
  .card-title { font-size: 0.88rem; font-weight: 600; line-height: 1.45; flex: 1; word-break: break-word; }
  .card-title.struck { text-decoration: line-through; color: var(--text-muted); }
  .card-menu-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 1.1rem; cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0; margin-top: -1px;
  }
  .card-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.5; word-break: break-word; margin-bottom: 6px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
  .cat-badge {
    font-size: 0.62rem; font-weight: 700; padding: 2px 8px;
    border-radius: 10px; text-transform: uppercase; letter-spacing: 0.4px;
  }
  .cb-work     { background: rgba(139,92,246,.12); color: var(--cat-work); }
  .cb-daily    { background: rgba(217,119,6,.12);  color: var(--cat-daily); }
  .cb-study    { background: rgba(14,116,144,.12); color: var(--cat-study); }
  .cb-personal { background: rgba(236,72,153,.12); color: var(--cat-personal); }
  .cb-kids     { background: rgba(46,125,50,.12);  color: var(--cat-kids); }
  .cb-other    { background: rgba(100,116,139,.12);color: var(--cat-other); }

  /* Mobile due date badge */
  .card-due-m { font-size: 0.65rem; font-weight: 600; }
  .card-due-m.overdue { color: #ef4444; }
  .card-due-m.soon    { color: #f59e0b; }
  .card-due-m.ok      { color: #64748b; }

  /* ── Tab bar ── */
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(var(--tab-h) + var(--safe-b));
    padding-bottom: var(--safe-b);
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; z-index: 50;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
    border: none; background: none; cursor: pointer;
    position: relative; padding: 8px 4px;
  }
  .tab-dot { width: 30px; height: 5px; border-radius: 3px; background: var(--border); transition: background 0.2s, transform 0.2s; }
  .tab[data-s="todo"]  .tab-dot { background: var(--todo); }
  .tab[data-s="doing"] .tab-dot { background: var(--doing); }
  .tab[data-s="done"]  .tab-dot { background: var(--done); }
  .tab.active .tab-dot { transform: scaleX(1.3); }
  .tab-name { font-size: 0.68rem; font-weight: 600; color: var(--text-muted); transition: color 0.15s, font-weight 0.15s; }
  .tab[data-s="todo"].active  .tab-name { color: var(--todo);  font-weight: 800; }
  .tab[data-s="doing"].active .tab-name { color: var(--doing); font-weight: 800; }
  .tab[data-s="done"].active  .tab-name { color: var(--done);  font-weight: 800; }
  .tab-cnt {
    position: absolute; top: 5px; right: 50%; margin-right: -18px;
    background: var(--accent); color: #fff;
    font-size: 0.58rem; font-weight: 700;
    min-width: 16px; height: 16px; padding: 0 4px;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
  }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: calc(var(--tab-h) + var(--safe-b) + 14px);
    right: 18px; width: 54px; height: 54px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff; font-size: 1.6rem;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(99,102,241,.4);
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 51; line-height: 1;
  }
  .fab:active { transform: scale(0.9); box-shadow: 0 2px 10px rgba(99,102,241,.3); }

  /* ── Bottom Sheet ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.4); z-index: 100; align-items: flex-end;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: var(--surface); border-radius: 20px 20px 0 0;
    padding: 0 18px calc(18px + var(--safe-b));
    width: 100%; max-height: 92dvh; overflow-y: auto;
    animation: sheetUp 0.28s cubic-bezier(.32,.72,0,1);
  }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 14px; }
  .sheet h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
  .field input, .field textarea {
    width: 100%; padding: 11px 13px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-size: 1rem; /* 16px以上にしないとiOSが自動ズームしてIMEが壊れる */
    font-family: inherit; outline: none; transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: none; min-height: 60px; }

  /* Category selector */
  .cat-grid { display: flex; gap: 6px; flex-wrap: wrap; }
  .cat-opt {
    padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    border: 1.5px solid var(--border); background: var(--bg); color: var(--text-muted);
    cursor: pointer; transition: all 0.15s;
  }
  .cat-opt[data-c="work"].sel     { border-color: var(--cat-work);     background: rgba(139,92,246,.1);  color: var(--cat-work); }
  .cat-opt[data-c="daily"].sel    { border-color: var(--cat-daily);    background: rgba(217,119,6,.1);   color: var(--cat-daily); }
  .cat-opt[data-c="study"].sel    { border-color: var(--cat-study);    background: rgba(14,116,144,.1);  color: var(--cat-study); }
  .cat-opt[data-c="personal"].sel { border-color: var(--cat-personal); background: rgba(236,72,153,.1);  color: var(--cat-personal); }
  .cat-opt[data-c="kids"].sel     { border-color: var(--cat-kids);     background: rgba(46,125,50,.1);   color: var(--cat-kids); }
  .cat-opt[data-c="other"].sel    { border-color: var(--cat-other);    background: rgba(100,116,139,.1); color: var(--cat-other); }

  /* Status selector */
  .status-row { display: flex; gap: 6px; }
  .status-opt {
    flex: 1; padding: 9px 4px; border-radius: 10px; font-size: 0.75rem; font-weight: 600;
    border: 1.5px solid var(--border); background: var(--bg); color: var(--text-muted);
    cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .status-opt[data-s="todo"].sel  { border-color: var(--todo);  background: rgba(245,158,11,.1);  color: var(--todo); }
  .status-opt[data-s="doing"].sel { border-color: var(--doing); background: rgba(59,130,246,.1);  color: var(--doing); }
  .status-opt[data-s="done"].sel  { border-color: var(--done);  background: rgba(16,185,129,.1);  color: var(--done); }

  .sheet-btns { display: flex; gap: 10px; margin-top: 6px; }
  .btn-cancel {
    flex: 1; padding: 13px; border-radius: 10px;
    font-size: 0.88rem; font-weight: 600;
    border: 1.5px solid var(--border); background: var(--bg); color: var(--text-muted); cursor: pointer;
  }
  .btn-submit {
    flex: 2; padding: 13px; border-radius: 10px;
    font-size: 0.88rem; font-weight: 700;
    border: none; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; cursor: pointer;
  }
  .btn-submit:active { opacity: 0.85; }

  /* Quick action buttons */
  .btn-quick-doing {
    width: 100%; padding: 14px; border-radius: 12px;
    font-size: 1rem; font-weight: 800; border: none;
    background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; cursor: pointer;
    letter-spacing: 0.3px; box-shadow: 0 4px 14px rgba(59,130,246,0.3);
  }
  .btn-quick-doing:active { opacity: 0.85; }
  .btn-quick-done {
    width: 100%; padding: 14px; border-radius: 12px;
    font-size: 1rem; font-weight: 800; border: none;
    background: linear-gradient(135deg, #10b981, #059669); color: #fff; cursor: pointer;
    letter-spacing: 0.3px; box-shadow: 0 4px 14px rgba(16,185,129,0.3);
  }
  .btn-quick-done:active { opacity: 0.85; }
  .btn-quick-undo {
    width: 100%; padding: 14px; border-radius: 12px;
    font-size: 1rem; font-weight: 700;
    border: 1.5px solid var(--border); background: var(--bg); color: var(--text-muted); cursor: pointer;
  }
  .btn-quick-undo:active { opacity: 0.85; }

  /* ── Delete confirm ── */
  .confirm-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center;
  }
  .confirm-overlay.open { display: flex; }
  .confirm-dialog {
    background: var(--surface); border-radius: 16px; padding: 24px 20px 20px;
    width: calc(100% - 48px); max-width: 300px;
    box-shadow: 0 8px 32px rgba(0,0,0,.2); animation: sheetUp 0.2s ease;
  }
  .confirm-title  { font-size: 1rem; font-weight: 700; text-align: center; margin-bottom: 6px; }
  .confirm-msg    { font-size: 0.82rem; text-align: center; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
  .confirm-btns   { display: flex; gap: 10px; }
  .confirm-cancel { flex: 1; padding: 12px; border-radius: 10px; font-size: 0.9rem; font-weight: 600; border: 1.5px solid var(--border); background: var(--bg); color: var(--text-muted); cursor: pointer; }
  .confirm-ok     { flex: 1; padding: 12px; border-radius: 10px; font-size: 0.9rem; font-weight: 700; border: none; background: #ef4444; color: #fff; cursor: pointer; }
  .confirm-ok:active { opacity: 0.85; }

  /* ── Tab background ── */
  body { transition: background 0.25s ease; }
  body.tab-todo  { background: #fef9ec; }
  body.tab-doing { background: #eff6ff; }
  body.tab-done  { background: #f0fdf4; }

  /* ── Tab slide animation ── */
  @keyframes slideFromRight { from { transform: translateX(48px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideFromLeft  { from { transform: translateX(-48px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .mobile-content.slide-from-right { animation: slideFromRight 0.22s ease; }
  .mobile-content.slide-from-left  { animation: slideFromLeft  0.22s ease; }

  /* ── Context menu ── */
  .ctx-overlay { display: none; position: fixed; inset: 0; z-index: 150; }
  .ctx-overlay.open { display: block; }
  .ctx-menu {
    display: none; position: fixed;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 13px; box-shadow: 0 8px 32px rgba(0,0,0,.16);
    z-index: 151; min-width: 180px; overflow: hidden;
  }
  .ctx-menu.open { display: block; }
  .ctx-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: none; background: none; width: 100%; text-align: left; color: var(--text); }
  .ctx-item:active { background: var(--bg); }
  .ctx-item + .ctx-item { border-top: 1px solid var(--border); }
  .ctx-item.danger { color: #ef4444; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: calc(var(--tab-h) + var(--safe-b) + 80px);
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1e293b; color: #fff;
    padding: 10px 18px; border-radius: 24px; font-size: 0.82rem; font-weight: 600;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    z-index: 200; display: flex; gap: 12px; align-items: center; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast-undo { background: none; border: none; color: #a5b4fc; font-size: 0.82rem; font-weight: 700; cursor: pointer; padding: 0; }

  /* Pull to refresh */
  .ptr {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    height: 0; overflow: hidden; font-size: 0.8rem; color: var(--text-muted);
    background: var(--bg); transition: height 0.2s ease; flex-shrink: 0;
  }
  .ptr.visible { height: 44px; }
  .ptr-spinner { font-size: 1.1rem; display: inline-block; transition: transform 0.2s; }
  .ptr.ready .ptr-spinner { transform: rotate(180deg); }
  @keyframes ptrSpin { to { transform: rotate(360deg); } }
  .ptr.loading .ptr-spinner { animation: ptrSpin 0.7s linear infinite; }

  /* Mobile repeat tab */
  .mobile-repeat-section {
    padding: 12px;
  }
  .mobile-repeat-title {
    font-size: 0.85rem; font-weight: 700; color: var(--text-muted);
    margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .mobile-repeat-items { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .mobile-repeat-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px; font-size: 0.82rem;
  }
  .mobile-repeat-item .mri-cat {
    font-size: 0.62rem; font-weight: 700; padding: 2px 7px; border-radius: 8px;
  }
  .mobile-repeat-item .mri-title { flex: 1; font-weight: 600; }
  .mobile-repeat-item .mri-delete {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 0.85rem; padding: 2px 4px;
  }
  .mobile-repeat-item .mri-delete:active { color: #ef4444; }
  .mobile-repeat-add { display: flex; flex-direction: column; gap: 8px; }
  .mobile-repeat-add input, .mobile-repeat-add select {
    width: 100%; padding: 11px 13px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 1rem;
    font-family: inherit; outline: none; transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .mobile-repeat-add input:focus, .mobile-repeat-add select:focus { border-color: var(--accent); }
  .mobile-repeat-add-btn {
    padding: 13px; background: #6366f1; color: #fff;
    border: none; border-radius: 10px; font-size: 0.9rem;
    font-weight: 700; cursor: pointer;
  }
  .mobile-repeat-add-btn:active { opacity: 0.85; }
  .mobile-repeat-hint { font-size: 0.72rem; color: var(--text-muted); margin-top: 8px; line-height: 1.5; }
  .mobile-repeat-empty { font-size: 0.8rem; color: var(--text-muted); text-align: center; padding: 20px 0; opacity: 0.7; }

  /* Mobile swimlane */
  .m-swimlane { }
  .m-swimlane + .m-swimlane { margin-top: 4px; padding-top: 8px; border-top: 1px solid var(--border); }
  .m-swimlane-header {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text-muted);
    padding: 0 2px 6px;
    letter-spacing: 0.3px;
    user-select: none;
  }

  /* Repeat tab in tab bar */
  .tab-bar-repeat .tab-dot { background: #a855f7 !important; }
  .tab[data-s="repeat"] .tab-dot { background: #a855f7; }
  .tab[data-s="repeat"].active .tab-name { color: #a855f7; font-weight: 800; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     DESKTOP HTML
     ═══════════════════════════════════════ -->

<!-- Desktop Header -->
<header class="desktop-header">
  <h1>Kanban Board</h1>
  <div class="header-stats" id="stats"></div>
  <div class="header-buttons">
    <button class="btn-add" onclick="desktopOpenModal()">+ New Task</button>
  </div>
</header>

<!-- Desktop Filter Bar -->
<div class="filter-bar" id="filterBar">
  <span class="filter-chip active" data-cat="all"      onclick="setFilter('all')">All</span>
  <span class="filter-chip"        data-cat="daily"    onclick="setFilter('daily')">Daily</span>
  <span class="filter-chip"        data-cat="personal" onclick="setFilter('personal')">Personal</span>
  <span class="filter-chip"        data-cat="work"     onclick="setFilter('work')">Work</span>
  <span class="filter-chip"        data-cat="study"    onclick="setFilter('study')">Study</span>
  <span class="filter-chip"        data-cat="kids"     onclick="setFilter('kids')">Kids</span>
  <span class="filter-chip"        data-cat="other"    onclick="setFilter('other')">Other</span>
</div>

<!-- Desktop Repeat Templates (collapsible) -->
<div class="repeat-section">
  <div class="repeat-header" onclick="toggleRepeatSection()">
    <div class="repeat-header-left">
      <span class="repeat-toggle" id="repeatToggle">&#x25B6;</span>
      &#x1F501; 毎日の繰り返しタスク
      <span id="repeatCount" style="font-weight:400; font-size:0.72rem;"></span>
    </div>
  </div>
  <div class="repeat-body" id="repeatBody">
    <div class="repeat-items" id="repeatItems"></div>
    <div class="repeat-add">
      <input type="text" id="repeatTitle" placeholder="タスク名" maxlength="100">
      <select id="repeatCat">
        <option value="daily">Daily</option>
        <option value="personal">Personal</option>
        <option value="work">Work</option>
        <option value="study">Study</option>
        <option value="kids">Kids</option>
        <option value="other">Other</option>
      </select>
      <button onclick="addRepeatTemplate()">追加</button>
    </div>
    <div class="repeat-hint">ここに登録したタスクは、毎日自動でTodoに追加されます。</div>
  </div>
</div>

<!-- Desktop Board -->
<div class="board" id="board">
  <div class="column" data-status="todo">
    <div class="column-header">
      <span class="col-label"><span class="col-icon"></span> Todo</span>
      <span class="col-count" id="count-todo">0</span>
    </div>
    <div class="column-body" id="col-todo"></div>
  </div>
  <div class="column" data-status="doing">
    <div class="column-header">
      <span class="col-label"><span class="col-icon"></span> Doing</span>
      <span class="col-count" id="count-doing">0</span>
    </div>
    <div class="column-body" id="col-doing"></div>
  </div>
  <div class="column" data-status="done">
    <div class="column-header">
      <span class="col-label"><span class="col-icon"></span> Done</span>
      <span class="col-count" id="count-done">0</span>
    </div>
    <div class="column-body" id="col-done"></div>
  </div>
</div>

<!-- Desktop Task Modal -->
<div class="modal-overlay" id="desktopModal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 id="modalTitle">New Task</h2>
    <label>Title *</label>
    <input type="text" id="taskTitle" placeholder="What needs to be done?" maxlength="100" autofocus>
    <label>Description</label>
    <textarea id="taskDesc" placeholder="Details (optional)" rows="2"></textarea>
    <label>Category</label>
    <select id="taskCat">
      <option value="daily">Daily</option>
      <option value="personal">Personal</option>
      <option value="work">Work</option>
      <option value="study">Study</option>
      <option value="kids">Kids</option>
      <option value="other">Other</option>
    </select>
    <label>Status</label>
    <select id="taskStatus">
      <option value="todo">Todo</option>
      <option value="doing">Doing</option>
      <option value="done">Done</option>
    </select>
    <label>期日（任意）</label>
    <input type="date" id="taskDue">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" id="modalSubmit" onclick="desktopSubmitTask()">Add Task</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     MOBILE HTML
     ═══════════════════════════════════════ -->

<!-- Mobile Header -->
<div class="mobile-header">
  <div class="header-row">
    <span class="header-title">📋 Kanban</span>
    <div class="header-btns">
      <button class="icon-btn" id="searchBtn" onclick="toggleSearch()" title="検索">🔍</button>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-row">
      <span id="progLabel">0% 完了</span>
      <span id="progStats"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="search-bar" id="searchBar">
    <div class="search-input-wrap">
      <span>🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="タスクを検索…" oninput="mobileRender()">
      <button class="search-clear" onclick="clearSearch()">✕</button>
    </div>
  </div>
  <div class="chips-scroll" id="chips">
    <span class="chip active" data-cat="all"      onclick="setFilter('all')">All</span>
    <span class="chip"        data-cat="daily"    onclick="setFilter('daily')">Daily</span>
    <span class="chip"        data-cat="work"     onclick="setFilter('work')">Work</span>
    <span class="chip"        data-cat="study"    onclick="setFilter('study')">Study</span>
    <span class="chip"        data-cat="personal" onclick="setFilter('personal')">Personal</span>
    <span class="chip"        data-cat="kids"     onclick="setFilter('kids')">Kids</span>
    <span class="chip"        data-cat="other"    onclick="setFilter('other')">Other</span>
  </div>
</div>

<!-- Pull to refresh indicator -->
<div class="ptr" id="ptr">
  <span class="ptr-spinner" id="ptrSpinner">↓</span>
  <span id="ptrLabel">引っ張って更新</span>
</div>

<!-- Mobile Card list -->
<div class="mobile-content" id="mobileContent"></div>

<!-- Mobile Tab bar -->
<div class="tab-bar">
  <button class="tab active" data-s="todo"   onclick="switchTab('todo')">
    <div class="tab-dot"></div>
    <span class="tab-name">Todo</span>
    <span class="tab-cnt" id="cnt-todo">0</span>
  </button>
  <button class="tab" data-s="doing"  onclick="switchTab('doing')">
    <div class="tab-dot"></div>
    <span class="tab-name">Doing</span>
    <span class="tab-cnt" id="cnt-doing">0</span>
  </button>
  <button class="tab" data-s="done"   onclick="switchTab('done')">
    <div class="tab-dot"></div>
    <span class="tab-name">Done</span>
    <span class="tab-cnt" id="cnt-done">0</span>
  </button>
  <button class="tab" data-s="repeat" onclick="switchTab('repeat')">
    <div class="tab-dot"></div>
    <span class="tab-name">繰返</span>
  </button>
</div>

<!-- Mobile FAB -->
<button class="fab" onclick="openSheet()" title="タスクを追加">＋</button>

<!-- Mobile Bottom Sheet -->
<div class="overlay" id="overlay" onclick="closeSheetOutside(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div id="quickDoneBar" style="display:none; margin-bottom:14px;">
      <button class="btn-quick-done" id="quickDoneBtn" onclick="quickAdvance()">✓ Done</button>
    </div>
    <h2 id="sheetTitle">新しいタスク</h2>
    <div class="field">
      <label>タイトル *</label>
      <input type="text" id="fTitle" placeholder="何をしますか？" maxlength="100">
    </div>
    <div class="field">
      <label>メモ</label>
      <textarea id="fDesc" placeholder="詳細（任意）" rows="2"></textarea>
    </div>
    <div class="field">
      <label>期日（任意）</label>
      <input type="date" id="fDue">
    </div>
    <div class="field">
      <label>カテゴリ</label>
      <div class="cat-grid" id="catGrid">
        <button class="cat-opt"     data-c="daily"    onclick="selCat('daily')">Daily</button>
        <button class="cat-opt sel" data-c="work"     onclick="selCat('work')">Work</button>
        <button class="cat-opt"     data-c="study"    onclick="selCat('study')">Study</button>
        <button class="cat-opt"     data-c="personal" onclick="selCat('personal')">Personal</button>
        <button class="cat-opt"     data-c="kids"     onclick="selCat('kids')">Kids</button>
        <button class="cat-opt"     data-c="other"    onclick="selCat('other')">Other</button>
      </div>
    </div>
    <div class="field">
      <label>ステータス</label>
      <div class="status-row">

<script type="module">
// ════════════════════════════════════════
// Firebase
// ════════════════════════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBadywmMpuz7v6uPaOis85YoTjRAT_yurU",
  authDomain: "my-kanban-4cafd.firebaseapp.com",

};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const tasksCol = collection(db, 'tasks');
const repeatsCol = collection(db, 'repeats');

// ════════════════════════════════════════
// Shared State
// ════════════════════════════════════════
let tasks = [];
let repeats = [];

const CAT = { daily:'Daily', work:'Work', study:'Study', personal:'Personal', kids:'Kids', other:'Other' };
const NEXT = { todo:'doing', doing:'done', done:'todo' };
const TABS_M = ['todo', 'doing', 'done'];

// ── Device detection ──
const isMobile = () => window.matchMedia('(max-width: 768px)').matches;

// ── Firebase helpers ──
async function saveTask(t) { const {id,...d} = t; await setDoc(doc(db,'tasks',id), d); }
async function removeTask(id) { await deleteDoc(doc(db,'tasks',id)); }
async function saveRepeat(r) { const {id,...d} = r; await setDoc(doc(db,'repeats',id), d); }
async function removeRepeat(id) { await deleteDoc(doc(db,'repeats',id)); }

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s) { const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }
function getDateStr(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getTopOrder(status) {
  const col = tasks.filter(t => t.status === status);
  if (!col.length) return 0;
  return Math.min(...col.map(t => t.order ?? 999999)) - 1;
}
function sortTasks(list) {
  return list.slice().sort((a,b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    const oa = a.order ?? 999999, ob = b.order ?? 999999;
    if (oa !== ob) return oa - ob;
    return a.created - b.created;
  });
}

// Due badge (desktop)
function dueBadge(due) {
  if (!due) return '';
  const today = getDateStr(Date.now());
  const diff = (new Date(due) - new Date(today)) / 86400000;
  if (diff < 0) return `<div class="card-due overdue">⚠ 期限切れ ${due}</div>`;
  if (diff <= 3) return `<div class="card-due soon">⏰ 期日 ${due}</div>`;
  return `<div class="card-due ok">📅 ${due}</div>`;
}

// Due badge (mobile)
function dueBadgeMobile(due) {
  if (!due) return '';
  const today = getDateStr(Date.now());
  const diff = (new Date(due) - new Date(today)) / 86400000;
  if (diff < 0) return `<span class="card-due-m overdue">⚠ 期限切れ ${due}</span>`;
  if (diff <= 3) return `<span class="card-due-m soon">⏰ 期日 ${due}</span>`;
  return `<span class="card-due-m ok">📅 ${due}</span>`;
}

// ════════════════════════════════════════
// DESKTOP LOGIC
// ════════════════════════════════════════
let desktopEditingId = null;
let dragId = null;

// ── Desktop Card HTML helper ──
function desktopCardHtml(t) {
  return `
    <div class="card card-cat-${t.category} ${t.pinned ? 'pinned' : ''}" draggable="true" data-id="${t.id}"
         ondragstart="onDragStart(event)" ondragend="onDragEnd(event)" ondblclick="desktopOpenEdit('${t.id}')">
      <div class="card-top">
        <span class="card-category cat-${t.category}">${CAT[t.category]}</span>
        <div class="card-actions">
          <button class="card-btn pin-btn" onclick="togglePin('${t.id}')" title="${t.pinned ? 'Unpin' : 'Pin'}"><span class="pin-icon">&#x1F4CC;</span></button>
          <button class="card-btn delete-btn" onclick="deleteTask('${t.id}')" title="Delete">&#x2715;</button>
        </div>
      </div>
      <div class="card-body">
        <div class="card-body-left">
          <div class="card-title">${esc(t.title)}</div>
          ${t.desc ? `<div class="card-desc">${esc(t.desc)}</div>` : ''}
          ${dueBadge(t.due)}
        </div>
      </div>
    </div>
  `;
}

// ── Desktop Render ──
function desktopRender() {
  ['todo','doing','done'].forEach(status => {
    const col = document.getElementById('col-' + status);
    if (!col) return;
    let visible;
    if (status === 'done') {
      visible = tasks.filter(t => t.status === 'done')
        .sort((a,b) => (b.doneAt||0) - (a.doneAt||0)).slice(0, 9);
    } else {
      visible = tasks.filter(t => t.status === status);
    }
    const count = visible.length;
    const countEl = document.getElementById('count-' + status);
    if (countEl) countEl.textContent = count;

    const filtered = sortTasks(visible.filter(t => currentFilter === 'all' || t.category === currentFilter));

    // Split into 個人 (non-work) and 仕事 (work) lanes
    const personalTasks = filtered.filter(t => t.category !== 'work');
    const workTasks     = filtered.filter(t => t.category === 'work');

    col.innerHTML = `
      <div class="swimlane">
        <div class="swimlane-header">👤 個人</div>
        <div class="swimlane-body" data-status="${status}" data-lane="personal">
          ${personalTasks.length > 0
            ? personalTasks.map(t => desktopCardHtml(t)).join('')
            : `<div class="empty-state" style="padding:12px 4px; font-size:0.75rem;">-</div>`}
        </div>
      </div>
      <div class="swimlane">
        <div class="swimlane-header">💼 仕事</div>
        <div class="swimlane-body" data-status="${status}" data-lane="work">
          ${workTasks.length > 0
            ? workTasks.map(t => desktopCardHtml(t)).join('')
            : `<div class="empty-state" style="padding:12px 4px; font-size:0.75rem;">-</div>`}
        </div>
      </div>
    `;
  });

  const total = tasks.length;
  const doneCount = tasks.filter(t => t.status === 'done').length;
  const doingCount = tasks.filter(t => t.status === 'doing').length;
  const todoCount = tasks.filter(t => t.status === 'todo').length;
  const statsEl = document.getElementById('stats');
  if (statsEl) statsEl.innerHTML = `
    <span><span class="stat-dot" style="background:var(--todo)"></span> ${todoCount} Todo</span>
    <span><span class="stat-dot" style="background:var(--doing)"></span> ${doingCount} Doing</span>
    <span><span class="stat-dot" style="background:var(--done)"></span> ${doneCount} Done</span>
  `;

  // Re-attach drag & drop to newly rendered swimlane bodies
  setupDragDrop();
}

// ── Desktop Repeat Render ──
function desktopRenderRepeats() {
  const container = document.getElementById('repeatItems');
  if (!container) return;
  const countEl = document.getElementById('repeatCount');
  if (countEl) countEl.textContent = repeats.length > 0 ? `(${repeats.length}件)` : '';
  if (repeats.length === 0) {
    container.innerHTML = '<span style="font-size:0.75rem; color:var(--text-muted);">テンプレートはまだありません</span>';
    return;
  }
  container.innerHTML = repeats.map(r => `
    <div class="repeat-item">
      <span class="ri-cat cat-${r.category}">${CAT[r.category]}</span>
      <span class="ri-title">${esc(r.title)}</span>
      <button class="ri-delete" onclick="deleteRepeatTemplate('${r.id}')" title="削除">&#x2715;</button>
    </div>
  `).join('');
}

// ── Desktop Modal ──
function desktopOpenModal() {
  desktopEditingId = null;
  document.getElementById('modalTitle').textContent = 'New Task';
  document.getElementById('modalSubmit').textContent = 'Add Task';
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDesc').value = '';
  document.getElementById('taskCat').value = 'work';
  document.getElementById('taskStatus').value = 'todo';
  document.getElementById('taskDue').value = '';
  document.getElementById('desktopModal').classList.add('active');
  setTimeout(() => document.getElementById('taskTitle').focus(), 100);
}

function desktopOpenEdit(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  desktopEditingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('modalSubmit').textContent = 'Save';
  document.getElementById('taskTitle').value = task.title;
  document.getElementById('taskDesc').value = task.desc || '';
  document.getElementById('taskCat').value = task.category;
  document.getElementById('taskStatus').value = task.status;
  document.getElementById('taskDue').value = task.due || '';
  document.getElementById('desktopModal').classList.add('active');
  setTimeout(() => document.getElementById('taskTitle').focus(), 100);
}

function closeModal() { document.getElementById('desktopModal').classList.remove('active'); }
function closeModalOutside(e) { if (e.target === document.getElementById('desktopModal')) closeModal(); }

async function desktopSubmitTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) { document.getElementById('taskTitle').focus(); return; }
  const desc = document.getElementById('taskDesc').value.trim();
  const cat = document.getElementById('taskCat').value;
  const status = document.getElementById('taskStatus').value;
  const due = document.getElementById('taskDue').value || null;

  if (desktopEditingId) {
    const task = tasks.find(t => t.id === desktopEditingId);
    if (task) {
      const wasNotDone = task.status !== 'done';
      task.title = title; task.desc = desc; task.category = cat; task.due = due;
      task.updatedAt = Date.now();
      if (task.status !== status) { task.status = status; task.updatedAt = Date.now(); }
      if (status === 'done') { task.pinned = false; task.doneAt = task.doneAt || Date.now(); }
      if (status !== 'done') { task.doneAt = null; }
      desktopRender();
      await saveTask(task);
      if (status === 'done' && wasNotDone) celebrate();
    }
  } else {
    const task = { id:genId(), title, desc, category:cat, status, due, created:Date.now(), updatedAt:Date.now(), pinned:false, order:getTopOrder(status) };
    tasks.push(task);
    desktopRender();
    await saveTask(task);
    if (status === 'done') celebrate();
  }
  closeModal();
}

// ── Desktop Drag & Drop ──
function onDragStart(e) {
  const card = e.target.closest('.card');
  dragId = card.dataset.id;
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragId);
}
function onDragEnd(e) {
  const card = e.target.closest('.card');
  if (card) card.classList.remove('dragging');
  document.querySelectorAll('.swimlane-body').forEach(c => c.classList.remove('drag-over'));
  document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
  dragId = null;
}
function getDropIndex(col, y) {
  const cards = [...col.querySelectorAll('.card:not(.dragging)')];
  for (let i = 0; i < cards.length; i++) {
    const rect = cards[i].getBoundingClientRect();
    if (y < rect.top + rect.height / 2) return i;
  }
  return cards.length;
}

// Set up drag & drop on swimlane bodies
function setupDragDrop() {
  document.querySelectorAll('.swimlane-body').forEach(lane => {
    lane.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      lane.classList.add('drag-over');
      lane.querySelectorAll('.drop-indicator').forEach(el => el.remove());
      const idx = getDropIndex(lane, e.clientY);
      const cards = [...lane.querySelectorAll('.card:not(.dragging)')];
      const indicator = document.createElement('div');
      indicator.className = 'drop-indicator';
      if (idx < cards.length) lane.insertBefore(indicator, cards[idx]);
      else lane.appendChild(indicator);
    });

    lane.addEventListener('dragleave', e => {
      if (!lane.contains(e.relatedTarget)) {
        lane.classList.remove('drag-over');
        lane.querySelectorAll('.drop-indicator').forEach(el => el.remove());
      }
    });

    lane.addEventListener('drop', async e => {
      e.preventDefault();
      lane.classList.remove('drag-over');
      lane.querySelectorAll('.drop-indicator').forEach(el => el.remove());
      if (!dragId) return;
      const newStatus = lane.dataset.status;
      const task = tasks.find(t => t.id === dragId);
      if (!task) return;
      const wasNotDone = task.status !== 'done';
      task.status = newStatus;
      task.updatedAt = Date.now();
      if (newStatus === 'done') { task.pinned = false; task.doneAt = Date.now(); }
      if (newStatus !== 'done') { task.doneAt = null; }
      // Reorder within same lane (same status, same category group)
      const dropIdx = getDropIndex(lane, e.clientY);
      const laneTasks = sortTasks(tasks.filter(t => t.status === newStatus && t.id !== dragId && (currentFilter === 'all' || t.category === currentFilter)));
      const reordered = [...laneTasks];
      reordered.splice(dropIdx, 0, task);
      reordered.forEach((t, i) => { t.order = i; });
      desktopRender();
      for (const t of reordered) await saveTask(t);
      if (newStatus === 'done' && wasNotDone) celebrate();
    });
  });
}

// ── Desktop Filter ──
function setFilter(cat) {
  currentFilter = cat;
  // Desktop filter chips
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.cat === cat));
  // Mobile chips
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.cat === cat));
  if (isMobile()) mobileRender();
  else desktopRender();
}

// ── Desktop Repeat Section Toggle ──
function toggleRepeatSection() {
  const body = document.getElementById('repeatBody');
  const toggle = document.getElementById('repeatToggle');

  toggle.classList.toggle('open', isOpen);
}

// ════════════════════════════════════════
// MOBILE LOGIC
// ════════════════════════════════════════
let currentTab = 'todo';
let selectedCat = 'work';
let selectedStatus = 'todo';
let ctxTargetId = null;
let deletedTask = null;
let deleteTimer = null;
const pendingDeletes = new Set();
let searchOpen = false;

// ── Mobile Render ──
function mobileRender() {
  if (currentTab === 'repeat') {
    mobileRenderRepeats();
    return;
  }

  const query = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  const content = document.getElementById('mobileContent');
  if (!content) return;

  const total = tasks.length;
  const doneCount  = tasks.filter(t => t.status === 'done').length;
  const doingCount = tasks.filter(t => t.status === 'doing').length;
  const todoCount  = tasks.filter(t => t.status === 'todo').length;
  const pct = total > 0 ? Math.round(doneCount / total * 100) : 0;

  const progFill  = document.getElementById('progFill');
  const progLabel = document.getElementById('progLabel');
  const progStats = document.getElementById('progStats');
  if (progFill)  progFill.style.width = pct + '%';
  if (progLabel) progLabel.textContent = `${pct}% 完了`;
  if (progStats) progStats.textContent = `📋${todoCount} ▶${doingCount} ✓${doneCount}`;

  const cntTodo  = document.getElementById('cnt-todo');
  const cntDoing = document.getElementById('cnt-doing');
  const cntDone  = document.getElementById('cnt-done');
  if (cntTodo)  cntTodo.textContent  = todoCount;
  if (cntDoing) cntDoing.textContent = doingCount;
  if (cntDone)  cntDone.textContent  = doneCount;

  let visible = tasks.filter(t => t.status === currentTab);
  if (currentTab === 'done') {
    visible = visible.sort((a,b) => (b.doneAt||0) - (a.doneAt||0));
  }
  let filtered = visible.filter(t =>
    (currentFilter === 'all' || t.category === currentFilter) &&
    (!query || t.title.toLowerCase().includes(query) || (t.desc||'').toLowerCase().includes(query))
  );
  filtered = sortTasks(filtered);

  if (filtered.length === 0) {
    const msgs  = { todo:'まだタスクがありません', doing:'進行中のタスクはありません', done:'完了したタスクはありません' };
    const icons = { todo:'📝', doing:'⚡', done:'🎉' };
    content.innerHTML = `<div class="empty"><div class="empty-icon">${icons[currentTab]}</div><p>${msgs[currentTab]}</p></div>`;
    return;
  }

  const mobileCardHtml = t => `
    <div class="swipe-wrap" data-id="${t.id}">
      <div class="card cc-${t.category} ${t.pinned?'pinned':''}" data-id="${t.id}"
           ontouchstart="swipeStart(event,'${t.id}')"
           ontouchmove="swipeMove(event,'${t.id}')"
           ontouchend="swipeEnd(event,'${t.id}')">
        <div class="card-top">
          <div class="card-title ${t.status==='done'?'struck':''}">${t.pinned?'📌 ':''}${esc(t.title)}</div>
          <button class="card-menu-btn" onclick="openCtx(event,'${t.id}')">⋯</button>
        </div>
        ${t.desc ? `<div class="card-desc">${esc(t.desc)}</div>` : ''}
        <div class="card-footer">
          <span class="cat-badge cb-${t.category}">${CAT[t.category]}</span>
          ${dueBadgeMobile(t.due)}
          ${t.doneAt && t.status==='done' ? `<span style="font-size:.65rem;color:var(--text-muted)">✓ ${new Date(t.doneAt).toLocaleDateString('ja-JP',{month:'short',day:'numeric'})}</span>` : ''}
        </div>
      </div>
    </div>
  `;

  const personalTasks = filtered.filter(t => t.category !== 'work');
  const workTasks     = filtered.filter(t => t.category === 'work');

  let html = '';
  if (personalTasks.length > 0) {
    html += `<div class="m-swimlane"><div class="m-swimlane-header">👤 個人</div>${personalTasks.map(mobileCardHtml).join('')}</div>`;
  }
  if (workTasks.length > 0) {
    html += `<div class="m-swimlane"><div class="m-swimlane-header">💼 仕事</div>${workTasks.map(mobileCardHtml).join('')}</div>`;
  }
  content.innerHTML = html;
}

// ── Mobile Repeat Render ──
function mobileRenderRepeats() {

  let itemsHtml = '';

    itemsHtml = '<div class="mobile-repeat-empty">テンプレートはまだありません</div>';

function render() {

// ── Bottom Sheet ──
function openSheet(id = null) {
  editingId = id;
  const task = id ? tasks.find(t => t.id === id) : null;
  document.getElementById('sheetTitle').textContent = id ? 'タスクを編集' : '新しいタスク';
  document.getElementById('sheetSubmit').textContent = id ? '保存' : '追加';
  document.getElementById('fTitle').value = task ? task.title : '';
  document.getElementById('fDesc').value = task ? (task.desc || '') : '';
  document.getElementById('fDue').value = task ? (task.due || '') : '';
  selCat(task ? task.category : 'work');
  selStatus(task ? task.status : currentTab === 'repeat' ? 'todo' : currentTab);

  const bar = document.getElementById('quickDoneBar');
  const btn = document.getElementById('quickDoneBtn');
  if (task && task.status === 'todo') {
    btn.textContent = '▶ Doing'; btn.className = 'btn-quick-doing'; btn.onclick = quickAdvance; bar.style.display = 'block';
  } else if (task && task.status === 'doing') {
    btn.textContent = '✓ Done'; btn.className = 'btn-quick-done'; btn.onclick = quickAdvance; bar.style.display = 'block';
  } else if (task && task.status === 'done') {
    btn.textContent = '↩ Todo に戻す'; btn.className = 'btn-quick-undo'; btn.onclick = quickUndone; bar.style.display = 'block';
  } else {
    bar.style.display = 'none';
  }

  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('fTitle').focus(), 300);
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
}
function closeSheetOutside(e) {
  if (e.target !== document.getElementById('overlay')) return;
  const active = document.activeElement;
  if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;
  closeSheet();
}

function selCat(c) {
  selectedCat = c;
  document.querySelectorAll('.cat-opt').forEach(el => el.classList.toggle('sel', el.dataset.c === c));
}
function selStatus(s) {
  selectedStatus = s;
  document.querySelectorAll('.status-opt').forEach(el => el.classList.toggle('sel', el.dataset.s === s));
}

async function quickAdvance() {
  if (!editingId) return;
  const task = tasks.find(t => t.id === editingId);
  if (!task) return;
  const wasNotDone = task.status !== 'done';
  task.status = NEXT[task.status];
  task.updatedAt = Date.now();
  if (task.status === 'done') { task.pinned = false; task.doneAt = Date.now(); }
  else { task.doneAt = null; }
  closeSheet(); mobileRender();
  await saveTask(task);
  if (task.status === 'done' && wasNotDone) celebrate();
}

async function quickUndone() {
  if (!editingId) return;
  const task = tasks.find(t => t.id === editingId);
  if (!task) return;
  task.status = 'todo'; task.doneAt = null; task.updatedAt = Date.now();
  closeSheet(); mobileRender();
  await saveTask(task);
}

async function mobileSubmitTask() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { document.getElementById('fTitle').focus(); return; }
  const desc = document.getElementById('fDesc').value.trim();
  const due  = document.getElementById('fDue').value || null;

  if (editingId) {
    const task = tasks.find(t => t.id === editingId);
    if (task) {
      const wasNotDone = task.status !== 'done';
      task.title = title; task.desc = desc; task.due = due;
      task.category = selectedCat; task.status = selectedStatus;
      task.updatedAt = Date.now();
      if (selectedStatus === 'done') { task.pinned = false; task.doneAt = task.doneAt || Date.now(); }
      if (selectedStatus !== 'done') { task.doneAt = null; }
      mobileRender();
      await saveTask(task);
      if (selectedStatus === 'done' && wasNotDone) celebrate();
    }
  } else {
    const task = { id:genId(), title, desc, due, category:selectedCat, status:selectedStatus,
                   created:Date.now(), updatedAt:Date.now(), pinned:false, order:getTopOrder(selectedStatus) };
    tasks.push(task);
    if (selectedStatus !== currentTab) switchTab(selectedStatus);
    mobileRender();
    await saveTask(task);
    if (selectedStatus === 'done') celebrate();
  }
  closeSheet();
}

// ── Context menu (Mobile) ──
function openCtx(e, id) {
  e.stopPropagation();
  ctxTargetId = id;
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  document.getElementById('ctxPin').textContent = task.pinned ? '📌 ピンを外す' : '📌 ピン留め';
  const menu = document.getElementById('ctxMenu');
  menu.classList.add('open');
  document.getElementById('ctxOverlay').classList.add('open');
  const x = Math.min(e.clientX || e.touches?.[0]?.clientX || 200, window.innerWidth - 200);
  const y = Math.min(e.clientY || e.touches?.[0]?.clientY || 200, window.innerHeight - 200);
  menu.style.left = x + 'px';
  menu.style.top  = y + 'px';
}
function closeCtx() {
  document.getElementById('ctxMenu').classList.remove('open');
  document.getElementById('ctxOverlay').classList.remove('open');
  ctxTargetId = null;
}
async function ctxAction(action) {
  const id = ctxTargetId;
  closeCtx();
  if (!id) return;
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  if (action === 'edit') { openSheet(id); }
  else if (action === 'pin') { task.pinned = !task.pinned; mobileRender(); await saveTask(task); }
  else if (action === 'delete') { askDelete(id); }
}

// ── Delete (Mobile soft-delete with undo) ──
let deleteTargetId = null;
function askDelete(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  deleteTargetId = id;
  document.getElementById('confirmMsg').textContent = `「${task.title}」を削除しますか？`;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() { deleteTargetId = null; document.getElementById('confirmOverlay').classList.remove('open'); }
function confirmDelete() { const id = deleteTargetId; closeConfirm(); if (id) softDelete(id); }

function softDelete(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  deletedTask = { ...task };
  pendingDeletes.add(id);
  tasks = tasks.filter(t => t.id !== id);
  mobileRender();
  clearTimeout(deleteTimer);
  showToast('削除しました');
  deleteTimer = setTimeout(async () => {
    pendingDeletes.delete(id);
    await removeTask(id);
    deletedTask = null;
  }, 4000);
}
async function undoDelete() {
  if (!deletedTask) return;
  clearTimeout(deleteTimer);
  pendingDeletes.delete(deletedTask.id);
  tasks.push(deletedTask);
  deletedTask = null;
  hideToast();
  mobileRender();
}
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(hideToast, 4500);
}
function hideToast() { document.getElementById('toast').classList.remove('show'); }

// ── Swipe gestures (Mobile) ──
let swipeState = {};
const SWIPE_THRESHOLD = 72;

function swipeStart(e, id) {
  swipeState[id] = {
    startX: e.touches[0].clientX, startY: e.touches[0].clientY,
    dir: null, delta: 0, target: e.target
  };
}
function swipeMove(e, id) {
  const s = swipeState[id];
  if (!s) return;
  const dx = e.touches[0].clientX - s.startX;
  const dy = e.touches[0].clientY - s.startY;
  if (!s.dir) {
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) s.dir = 'h';
    else if (Math.abs(dy) > 8) s.dir = 'v';
  }
  if (s.dir === 'h') e.preventDefault();
}
async function swipeEnd(e, id) {
  const s = swipeState[id];
  if (!s) return;
  delete swipeState[id];
  if (s.dir === null) {
    if (!s.target.closest('.card-menu-btn')) openSheet(id);
  }
}

// ── Pull to refresh (Mobile) ──
const mobileContentEl = document.getElementById('mobileContent');
const ptrEl = document.getElementById('ptr');
const ptrSpinner = document.getElementById('ptrSpinner');
const ptrLabel = document.getElementById('ptrLabel');
let ptrStartY = null;
const PTR_THRESHOLD = 64;

if (mobileContentEl) {
  mobileContentEl.addEventListener('touchstart', e => {
    if (mobileContentEl.scrollTop === 0) ptrStartY = e.touches[0].clientY;
  }, { passive: true });
  mobileContentEl.addEventListener('touchmove', e => {
    if (ptrStartY === null) return;
    if (mobileContentEl.scrollTop > 0) { ptrStartY = null; return; }
    const dy = e.touches[0].clientY - ptrStartY;
    if (dy <= 0) { ptrStartY = null; return; }
    const ready = dy >= PTR_THRESHOLD;
    if (ptrSpinner) ptrSpinner.textContent = ready ? '↑' : '↓';
    if (ptrLabel)   ptrLabel.textContent   = ready ? '離して更新' : '引っ張って更新';
    if (ptrEl) { ptrEl.classList.toggle('ready', ready); ptrEl.classList.add('visible'); }
  }, { passive: true });
  mobileContentEl.addEventListener('touchend', async e => {
    if (ptrStartY === null) return;
    const dy = e.changedTouches[0].clientY - ptrStartY;
    ptrStartY = null;
    if (dy >= PTR_THRESHOLD) {
      if (ptrSpinner) ptrSpinner.textContent = '🔄';
      if (ptrLabel)   ptrLabel.textContent   = '更新中…';
      if (ptrEl) { ptrEl.classList.remove('ready'); ptrEl.classList.add('loading'); }
      mobileRender();
      await new Promise(r => setTimeout(r, 700));
      if (ptrEl) ptrEl.classList.remove('loading');
    }
    if (ptrEl) ptrEl.classList.remove('visible', 'ready');
  }, { passive: true });

  // Tab swipe
  let tabSwipeStart = null;
  mobileContentEl.addEventListener('touchstart', e => {
    tabSwipeStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  mobileContentEl.addEventListener('touchend', e => {
    if (!tabSwipeStart) return;
    const dx = e.changedTouches[0].clientX - tabSwipeStart.x;
    const dy = e.changedTouches[0].clientY - tabSwipeStart.y;
    tabSwipeStart = null;
    if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx) * 0.8) return;
    if (currentTab === 'repeat') return; // don't swipe away from repeat
    const idx = TABS_M.indexOf(currentTab);
    if (dx < 0 && idx < TABS_M.length - 1) switchTab(TABS_M[idx + 1], 'right');
    else if (dx > 0 && idx > 0)            switchTab(TABS_M[idx - 1], 'left');
  }, { passive: true });
}

// ── Toggle Pin ──
async function togglePin(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.pinned = !task.pinned;
  render();
  await saveTask(task);
}

// ── Delete Task (desktop) ──
async function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  render();
  await removeTask(id);
}

// ── Repeat Templates ──
async function addRepeatTemplate() {
  // Support both desktop and mobile inputs
  const desktopInput = document.getElementById('repeatTitle');
  const mobileInput  = document.getElementById('mRepeatTitle');
  const desktopCat   = document.getElementById('repeatCat');
  const mobileCat    = document.getElementById('mRepeatCat');

  const input = (mobileInput && document.activeElement !== desktopInput) ? mobileInput : desktopInput;
  const catEl = (mobileCat && input === mobileInput) ? mobileCat : desktopCat;

  if (!input) return;
  const title = input.value.trim();
  if (!title) { input.focus(); return; }
  const category = catEl ? catEl.value : 'daily';

  const r = { id: genId(), title, category };
  repeats.push(r);
  if (isMobile()) mobileRenderRepeats();
  else desktopRenderRepeats();
  await saveRepeat(r);
  input.value = '';
  input.focus();
}

async function deleteRepeatTemplate(id) {
  repeats = repeats.filter(r => r.id !== id);
  if (isMobile()) mobileRenderRepeats();
  else desktopRenderRepeats();
  await removeRepeat(id);
}

// ── Daily Repeats Processing ──
async function processRepeats() {
  const today = getDateStr(Date.now());
  for (const rt of repeats) {
    if (tasks.some(t => t.repeatSourceId === rt.id && t.repeatDate === today)) continue;
    const t = { id:genId(), title:rt.title, desc:'', category:'daily', status:'todo',
                created:Date.now(), updatedAt:Date.now(), pinned:false, order:getTopOrder('todo'),
                repeatSourceId:rt.id, repeatDate:today };
    tasks.push(t);
    await saveTask(t);
  }
}

// ── Confetti ──
function celebrate() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const colors = ['#f59e0b','#3b82f6','#10b981','#8b5cf6','#ec4899','#ef4444','#06b6d4'];
  const particles = [];
  for (let i = 0; i < 90; i++) {
    particles.push({
      x: Math.random() * canvas.width, y: -20 - Math.random() * 80,
      w: 6 + Math.random()*6, h: 4 + Math.random()*4,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random()-.5)*4, vy: 2+Math.random()*4,
      rot: Math.random()*Math.PI*2, vr: (Math.random()-.5)*.15, life: 1
    });
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    particles.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.rot+=p.vr; p.life-=0.008;
      if (p.life <= 0) return;
      alive = true;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h); ctx.restore();
    });
    if (alive) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

// ── Keyboard handlers ──
document.addEventListener('keydown', e => {
  if (e.isComposing || e.keyCode === 229) return;
  if (e.key === 'Escape') {
    closeModal();
    closeSheet();
    return;
  }
  // Desktop: Enter submits modal
  const desktopModalActive = document.getElementById('desktopModal')?.classList.contains('active');
  if (e.key === 'Enter' && desktopModalActive && !isMobile()) {
    if (document.activeElement.tagName !== 'TEXTAREA') desktopSubmitTask();
  }
  // Mobile: Enter handling for iOS IME
  if (e.key === 'Enter') {
    const active = document.activeElement;
    const overlayOpen = document.getElementById('overlay')?.classList.contains('open');
    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA') && overlayOpen) {
      e.preventDefault(); active.blur(); active.focus();
    }
  }
});

// Desktop repeat input Enter key
document.getElementById('repeatTitle')?.addEventListener('keydown', e => {
  if (e.isComposing || e.keyCode === 229) return;
  if (e.key === 'Enter') addRepeatTemplate();
});

window.closeModalOutside     = closeModalOutside;

window.closeSheet            = closeSheet;

// ── Init ──
async function init() {
  // Load repeats first (needed by processRepeats)
  const repeatSnap = await getDocs(repeatsCol);
  repeats = repeatSnap.docs.map(d => ({ id:d.id, ...d.data() }));
  desktopRenderRepeats();

  // Set up desktop drag & drop
  setupDragDrop();

  // Set initial mobile tab background
  if (isMobile()) {
    document.body.classList.add('tab-todo');
  }

  let firstLoad = true;
  onSnapshot(tasksCol, async snapshot => {
    tasks = snapshot.docs
      .map(d => ({ id:d.id, ...d.data() }))
      .filter(t => !pendingDeletes.has(t.id));
    // Migrate: health → personal
    const toMigrate = tasks.filter(t => t.category === 'health');
    for (const t of toMigrate) { t.category = 'personal'; await saveTask(t); }
    render();
    if (firstLoad) {
      firstLoad = false;
      await processRepeats();
      render();
    }
  });

  onSnapshot(repeatsCol, snap => {
    repeats = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    desktopRenderRepeats();
    if (isMobile() && currentTab === 'repeat') mobileRenderRepeats();
  });
}

init();
